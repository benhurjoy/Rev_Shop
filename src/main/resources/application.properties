# ==========================================
# RevShop Application Configuration
# ==========================================

# Server
server.port=8081
server.servlet.context-path=/

# Application Name
spring.application.name=revshop

# ==========================================
# Database ? Oracle
# ==========================================
# Format options:
#   SID-based:          jdbc:oracle:thin:@localhost:1521:orcl
#   Service name-based: jdbc:oracle:thin:@//localhost:1521/orclpdb1
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/XEPDB1
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Connection Pool (HikariCP ? values unchanged, work fine with Oracle)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# Oracle-specific: ensures LocalDateTime maps correctly to TIMESTAMP
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ==========================================
# Thymeleaf
# ==========================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ==========================================
# Mail ? Gmail SMTP (unchanged)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==========================================
# JWT (unchanged)
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ==========================================
# Razorpay (unchanged)
# ==========================================
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# ==========================================
# File Upload (unchanged)
# ==========================================
file.upload-dir=uploads/products
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# Logging ? Log4j2 (unchanged)
# ==========================================
logging.config=classpath:log4j2.xml

# ==========================================
# Async (unchanged)
# ==========================================
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=25

# ==========================================
# Static Resources (unchanged)
# ==========================================
spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.web.resources.cache.period=3600