<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} ?: 'RevShop'">RevShop</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <!-- Animate.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet"/>

    <style>
        :root {
            --navy:       #0A1628;
            --navy-mid:   #112240;
            --navy-light: #1E3A5F;
            --orange:     #FF6B35;
            --orange-light:#FF8C5A;
            --gold:       #FFB347;
            --text-light: #E8EDF5;
            --text-muted: #8899AA;
            --card-bg:    #112240;
            --border:     rgba(255,107,53,0.2);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--navy);
            color: var(--text-light);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        h1,h2,h3,h4,h5 {
            font-family: 'Playfair Display', serif;
        }

        /* ── Navbar ── */
        .revshop-navbar {
            background: linear-gradient(135deg, #0A1628 0%, #1E3A5F 100%);
            border-bottom: 2px solid var(--orange);
            padding: 0.75rem 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-light) !important;
            letter-spacing: -0.5px;
        }

        .navbar-brand span {
            color: var(--orange);
        }

        .nav-link {
            color: var(--text-muted) !important;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.5rem 1rem !important;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-light) !important;
            background: rgba(255,107,53,0.15);
        }

        .nav-link i { margin-right: 5px; }

        .nav-badge {
            background: var(--orange);
            color: white;
            border-radius: 50%;
            font-size: 0.65rem;
            padding: 2px 6px;
            position: absolute;
            top: 2px;
            right: 2px;
        }

        /* ── Buttons ── */
        .btn-orange {
            background: linear-gradient(135deg, var(--orange), #e85d2b);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255,107,53,0.3);
        }

        .btn-orange:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,107,53,0.5);
            color: white;
        }

        .btn-navy {
            background: var(--navy-light);
            color: var(--text-light);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-navy:hover {
            background: var(--orange);
            border-color: var(--orange);
            color: white;
        }

        .btn-outline-orange {
            background: transparent;
            color: var(--orange);
            border: 1.5px solid var(--orange);
            border-radius: 10px;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-outline-orange:hover {
            background: var(--orange);
            color: white;
            transform: translateY(-2px);
        }

        /* ── Cards ── */
        .rev-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .rev-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(255,107,53,0.15);
            border-color: var(--orange);
        }

        /* ── Product Cards ── */
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.35s ease;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 60px rgba(255,107,53,0.2);
            border-color: var(--orange);
        }

        .product-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .product-card:hover img {
            transform: scale(1.05);
        }

        .product-card-body {
            padding: 1.2rem;
        }

        .product-card-title {
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-light);
            margin-bottom: 0.4rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-price {
            color: var(--orange);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .product-mrp {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-decoration: line-through;
        }

        .discount-badge {
            background: linear-gradient(135deg, var(--orange), #e85d2b);
            color: white;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
        }

        /* ── Forms ── */
        .rev-form-control {
            background: rgba(255,255,255,0.05) !important;
            border: 1.5px solid rgba(255,107,53,0.25) !important;
            border-radius: 10px !important;
            color: var(--text-light) !important;
            padding: 0.75rem 1rem !important;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
        }

        .rev-form-control:focus {
            background: rgba(255,255,255,0.08) !important;
            border-color: var(--orange) !important;
            box-shadow: 0 0 0 3px rgba(255,107,53,0.15) !important;
            color: var(--text-light) !important;
        }

        .rev-form-control::placeholder {
            color: var(--text-muted) !important;
        }

        .rev-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
        }

        /* ── Alerts ── */
        .alert-success-rev {
            background: rgba(40,167,69,0.15);
            border: 1px solid rgba(40,167,69,0.4);
            color: #75f5a0;
            border-radius: 10px;
            padding: 1rem 1.2rem;
        }

        .alert-error-rev {
            background: rgba(220,53,69,0.15);
            border: 1px solid rgba(220,53,69,0.4);
            color: #ff8fa3;
            border-radius: 10px;
            padding: 1rem 1.2rem;
        }

        /* ── Tables ── */
        .rev-table {
            color: var(--text-light);
        }

        .rev-table thead th {
            background: var(--navy-light);
            color: var(--orange);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            padding: 1rem;
        }

        .rev-table tbody tr {
            border-bottom: 1px solid rgba(255,107,53,0.08);
            transition: background 0.2s ease;
        }

        .rev-table tbody tr:hover {
            background: rgba(255,107,53,0.05);
        }

        .rev-table tbody td {
            padding: 1rem;
            vertical-align: middle;
            border: none;
            color: var(--text-light);
        }

        /* ── Badges ── */
        .badge-orange {
            background: rgba(255,107,53,0.2);
            color: var(--orange);
            border: 1px solid rgba(255,107,53,0.3);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .badge-success-rev {
            background: rgba(40,167,69,0.15);
            color: #75f5a0;
            border: 1px solid rgba(40,167,69,0.3);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 0.78rem;
        }

        .badge-danger-rev {
            background: rgba(220,53,69,0.15);
            color: #ff8fa3;
            border: 1px solid rgba(220,53,69,0.3);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 0.78rem;
        }

        .badge-warning-rev {
            background: rgba(255,179,71,0.15);
            color: var(--gold);
            border: 1px solid rgba(255,179,71,0.3);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 0.78rem;
        }

        /* ── Sidebar ── */
        .rev-sidebar {
            background: var(--card-bg);
            border-right: 1px solid var(--border);
            min-height: calc(100vh - 70px);
            padding: 1.5rem 0;
            width: 240px;
            position: fixed;
            top: 70px;
            left: 0;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.75rem 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            border-left: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .sidebar-link:hover, .sidebar-link.active {
            color: var(--orange);
            background: rgba(255,107,53,0.08);
            border-left-color: var(--orange);
        }

        .sidebar-link i { font-size: 1.1rem; }

        .main-content {
            margin-left: 240px;
            padding: 2rem;
        }

        /* ── Page Header ── */
        .page-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .page-header h2 {
            font-size: 1.8rem;
            color: var(--text-light);
            margin-bottom: 0.25rem;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0;
        }

        /* ── Stars ── */
        .stars { color: var(--gold); }

        /* ── Stat Cards ── */
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 80px; height: 80px;
            border-radius: 0 16px 0 100%;
            opacity: 0.1;
        }

        .stat-card.orange::before { background: var(--orange); }
        .stat-card.gold::before   { background: var(--gold); }
        .stat-card.green::before  { background: #28a745; }
        .stat-card.blue::before   { background: #17a2b8; }

        .stat-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            margin-bottom: 1rem;
        }

        .stat-icon.orange { background: rgba(255,107,53,0.15); color: var(--orange); }
        .stat-icon.gold   { background: rgba(255,179,71,0.15); color: var(--gold); }
        .stat-icon.green  { background: rgba(40,167,69,0.15);  color: #75f5a0; }
        .stat-icon.blue   { background: rgba(23,162,184,0.15); color: #5bc8d5; }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-light);
            line-height: 1;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        /* ── Footer ── */
        .rev-footer {
            background: var(--navy-mid);
            border-top: 1px solid var(--border);
            padding: 2rem 0;
            margin-top: 4rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--navy); }
        ::-webkit-scrollbar-thumb {
            background: var(--navy-light);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--orange); }

        /* ── Animations ── */
        .fade-in-up {
            animation: fadeInUp 0.5s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .rev-sidebar { display: none; }
            .main-content { margin-left: 0; padding: 1rem; }
        }
    </style>
    <th:block th:replace="${extraStyles}"></th:block>
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────── -->
<nav class="revshop-navbar navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/}">Rev<span>Shop</span></a>

        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <i class="bi bi-list text-light fs-4"></i>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- Admin Nav -->
            <ul class="navbar-nav me-auto" sec:authorize="hasRole('ADMIN')">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/dashboard}">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/users}">
                        <i class="bi bi-people"></i> Users
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/products}">
                        <i class="bi bi-box-seam"></i> Products
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/orders}">
                        <i class="bi bi-bag-check"></i> Orders
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/categories}">
                        <i class="bi bi-grid"></i> Categories
                    </a>
                </li>
            </ul>

            <!-- Seller Nav -->
            <ul class="navbar-nav me-auto" sec:authorize="hasRole('SELLER')">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/seller/dashboard}">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/seller/products}">
                        <i class="bi bi-box-seam"></i> Products
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/seller/low-stock}">
                        <i class="bi bi-exclamation-triangle"></i> Low Stock
                    </a>
                </li>
            </ul>

            <!-- Buyer Nav -->
            <ul class="navbar-nav me-auto" sec:authorize="hasRole('BUYER')">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/buyer/home}">
                        <i class="bi bi-house"></i> Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/buyer/wishlist}">
                        <i class="bi bi-heart"></i> Wishlist
                    </a>
                </li>
            </ul>

            <!-- Public Nav -->
            <ul class="navbar-nav me-auto" sec:authorize="isAnonymous()">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        <i class="bi bi-house"></i> Home
                    </a>
                </li>
            </ul>

            <!-- Right Side -->
            <ul class="navbar-nav ms-auto align-items-center gap-2">

                <!-- Cart (Buyer only) -->
                <li class="nav-item position-relative" sec:authorize="hasRole('BUYER')">
                    <a class="nav-link" th:href="@{/buyer/cart}">
                        <i class="bi bi-cart3 fs-5"></i>
                        <span class="nav-badge" th:if="${cartCount != null and cartCount > 0}"
                              th:text="${cartCount}">0</span>
                    </a>
                </li>

                <!-- Notifications -->
                <li class="nav-item position-relative"
                    sec:authorize="hasAnyRole('BUYER','SELLER')">
                    <a class="nav-link"
                       th:href="${#authorization.expression('hasRole(''BUYER'')')} ? '/buyer/notifications' : '/seller/notifications'">
                        <i class="bi bi-bell fs-5"></i>
                        <span class="nav-badge"
                              th:if="${unreadCount != null and unreadCount > 0}"
                              th:text="${unreadCount}">0</span>
                    </a>
                </li>

                <!-- Logged In -->
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2"
                       href="#" data-bs-toggle="dropdown">
                        <div style="width:34px;height:34px;border-radius:50%;
                                    background:linear-gradient(135deg,var(--orange),#e85d2b);
                                    display:flex;align-items:center;justify-content:center;
                                    font-size:0.85rem;font-weight:700;color:white;">
                            <sec:authentication property="principal.username"
                                                var="username" scope="request"/>
                            <span th:text="${#strings.substring(username,0,1).toUpperCase()}">U</span>
                        </div>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end"
                        style="background:var(--card-bg);border:1px solid var(--border);border-radius:12px;">
                        <li>
                            <span class="dropdown-item-text"
                                  style="color:var(--text-muted);font-size:0.8rem;"
                                  th:text="${username}">user@email.com</span>
                        </li>
                        <li><hr style="border-color:var(--border);margin:0.3rem 0;"></li>
                        <li>
                            <a class="dropdown-item"
                               style="color:var(--text-light);"
                               th:href="@{/auth/logout}">
                                <i class="bi bi-box-arrow-right me-2"></i>Logout
                            </a>
                        </li>
                    </ul>
                </li>

                <!-- Not Logged In -->
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="btn btn-orange" th:href="@{/auth/login}">
                        <i class="bi bi-person me-1"></i>Login
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ── Page Content ── -->
<th:block th:replace="${content}"></th:block>

<!-- ── Footer ── -->
<footer class="rev-footer" th:if="${showFooter != false}">
    <div class="container">
        <p style="font-family:'Playfair Display',serif;font-size:1.2rem;
                  color:var(--text-light);margin-bottom:0.5rem;">
            Rev<span style="color:var(--orange);">Shop</span>
        </p>
        <p>© 2026 RevShop. Built with ❤️ by Team RevShop</p>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="${extraScripts}"></th:block>
</body>
</html>
