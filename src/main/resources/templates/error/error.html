<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Error – RevShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root{--navy:#0A1628;--navy-mid:#112240;--orange:#FF6B35;--text-light:#E8EDF5;--text-muted:#8899AA;}
        body{background:var(--navy);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
        .error-card{background:var(--navy-mid);border:1px solid rgba(220,53,69,0.3);border-radius:20px;padding:2.5rem;max-width:480px;width:100%;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,0.4);}
        .error-icon{font-size:3.5rem;color:#ff8fa3;margin-bottom:1rem;}
        h3{font-family:'Playfair Display',serif;color:var(--text-light);}
        p{color:var(--text-muted);}
        .btn-home{background:linear-gradient(135deg,var(--orange),#e85d2b);color:white;border:none;border-radius:12px;padding:0.8rem 2rem;font-weight:600;text-decoration:none;display:inline-block;transition:all 0.3s ease;}
        .btn-home:hover{transform:translateY(-2px);color:white;}
    </style>
</head>
<body>
<div style="padding:1rem;width:100%;">
    <div class="error-card">
        <div class="error-icon"><i class="bi bi-x-octagon"></i></div>
        <h3>Oops! Something went wrong</h3>
        <p class="mb-4" th:text="${errorMessage} ?: 'An unexpected error occurred.'"></p>
        <a th:href="@{/}" class="btn-home">
            <i class="bi bi-house me-2"></i>Back to Home
        </a>
        &nbsp;
        <a onclick="history.back()" class="btn-home"
           style="background:var(--navy-light);cursor:pointer;">
            <i class="bi bi-arrow-left me-2"></i>Go Back
        </a>
    </div>
</div>
</body>
</html>
