<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>404 – RevShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root{--navy:#0A1628;--orange:#FF6B35;--text-light:#E8EDF5;--text-muted:#8899AA;}
        body{background:var(--navy);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;}
        .error-code{font-family:'Playfair Display',serif;font-size:8rem;font-weight:800;color:var(--orange);opacity:0.15;line-height:1;position:absolute;}
        .error-content{position:relative;z-index:1;}
        .error-icon{font-size:4rem;color:var(--orange);margin-bottom:1rem;}
        h2{font-family:'Playfair Display',serif;color:var(--text-light);font-size:2rem;}
        p{color:var(--text-muted);}
        .btn-home{background:linear-gradient(135deg,var(--orange),#e85d2b);color:white;border:none;border-radius:12px;padding:0.8rem 2rem;font-weight:600;text-decoration:none;display:inline-block;transition:all 0.3s ease;}
        .btn-home:hover{transform:translateY(-2px);color:white;}
    </style>
</head>
<body>
<div class="position-relative" style="padding:3rem;">
    <div class="error-code">404</div>
    <div class="error-content">
        <div class="error-icon"><i class="bi bi-compass"></i></div>
        <h2>Page Not Found</h2>
        <p class="mb-4" th:text="${errorMessage} ?: 'The page you are looking for does not exist.'"></p>
        <a th:href="@{/}" class="btn-home">
            <i class="bi bi-house me-2"></i>Back to Home
        </a>
    </div>
</div>
</body>
</html>
