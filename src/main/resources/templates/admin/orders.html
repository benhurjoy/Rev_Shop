<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Orders – RevShop Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root{--navy:#0A1628;--navy-mid:#112240;--navy-light:#1E3A5F;--orange:#FF6B35;--gold:#FFB347;--text-light:#E8EDF5;--text-muted:#8899AA;--card-bg:#112240;--border:rgba(255,107,53,0.2);}
        body{background:var(--navy);color:var(--text-light);font-family:'DM Sans',sans-serif;margin:0;}
        h1,h2,h3,h4,h5{font-family:'Playfair Display',serif;}
        .revshop-navbar{background:linear-gradient(135deg,#0A1628,#1E3A5F);border-bottom:2px solid var(--orange);padding:0.75rem 0;position:sticky;top:0;z-index:1000;}
        .navbar-brand{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:800;color:var(--text-light)!important;}
        .navbar-brand span{color:var(--orange);}
        .nav-link{color:var(--text-muted)!important;font-weight:500;padding:0.5rem 1rem!important;border-radius:8px;transition:all 0.3s;}
        .nav-link:hover{color:var(--text-light)!important;background:rgba(255,107,53,0.15);}
        .sidebar{background:var(--card-bg);border-right:1px solid var(--border);min-height:calc(100vh - 66px);width:230px;position:fixed;top:66px;left:0;padding:1.5rem 0;}
        .sidebar-link{display:flex;align-items:center;gap:10px;padding:0.75rem 1.5rem;color:var(--text-muted);text-decoration:none;font-weight:500;font-size:0.9rem;border-left:3px solid transparent;transition:all 0.3s;}
        .sidebar-link:hover,.sidebar-link.active{color:var(--orange);background:rgba(255,107,53,0.08);border-left-color:var(--orange);}
        .main{margin-left:230px;padding:2rem;}
        .section-card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
        .section-hdr{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);}
        .rev-table{color:var(--text-light);}
        .rev-table thead th{background:var(--navy-light);color:var(--orange);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.5px;border:none;padding:1rem;}
        .rev-table tbody tr{border-bottom:1px solid rgba(255,107,53,0.06);transition:background 0.2s;}
        .rev-table tbody tr:hover{background:rgba(255,107,53,0.04);}
        .rev-table tbody td{padding:0.9rem 1rem;border:none;vertical-align:middle;}
        .status-pending{background:rgba(255,179,71,0.12);color:var(--gold);border:1px solid rgba(255,179,71,0.3);border-radius:8px;padding:3px 10px;font-size:0.75rem;font-weight:600;}
        .status-processing{background:rgba(23,162,184,0.12);color:#5bc8d5;border:1px solid rgba(23,162,184,0.3);border-radius:8px;padding:3px 10px;font-size:0.75rem;font-weight:600;}
        .status-shipped{background:rgba(111,66,193,0.12);color:#c084fc;border:1px solid rgba(111,66,193,0.3);border-radius:8px;padding:3px 10px;font-size:0.75rem;font-weight:600;}
        .status-delivered{background:rgba(40,167,69,0.12);color:#75f5a0;border:1px solid rgba(40,167,69,0.3);border-radius:8px;padding:3px 10px;font-size:0.75rem;font-weight:600;}
        .status-cancelled{background:rgba(220,53,69,0.12);color:#ff8fa3;border:1px solid rgba(220,53,69,0.3);border-radius:8px;padding:3px 10px;font-size:0.75rem;font-weight:600;}
        .status-select{background:rgba(255,255,255,0.05);border:1px solid rgba(255,107,53,0.2);border-radius:8px;color:var(--text-light);padding:4px 8px;font-size:0.8rem;cursor:pointer;}
        .status-select:focus{border-color:var(--orange);outline:none;}
        .status-select option{background:var(--navy-mid);}
        .btn-update{background:linear-gradient(135deg,var(--orange),#e85d2b);color:white;border:none;border-radius:8px;padding:4px 12px;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
        .btn-update:hover{transform:translateY(-1px);}
        .alert-success-rev{background:rgba(40,167,69,0.12);border:1px solid rgba(40,167,69,0.3);color:#75f5a0;border-radius:10px;padding:0.8rem 1rem;}
        @media(max-width:768px){.sidebar{display:none;}.main{margin-left:0;padding:1rem;}}
    </style>
</head>
<body>
<nav class="revshop-navbar navbar">
    <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/}">Rev<span>Shop</span></a>
        <a class="nav-link ms-auto" th:href="@{/auth/logout}">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
        </a>
    </div>
</nav>

<div class="sidebar">
    <a th:href="@{/admin/dashboard}"  class="sidebar-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a th:href="@{/admin/users}"      class="sidebar-link"><i class="bi bi-people"></i> Users</a>
    <a th:href="@{/admin/products}"   class="sidebar-link"><i class="bi bi-box-seam"></i> Products</a>
    <a th:href="@{/admin/orders}"     class="sidebar-link active"><i class="bi bi-bag-check"></i> Orders</a>
    <a th:href="@{/admin/categories}" class="sidebar-link"><i class="bi bi-grid"></i> Categories</a>
    <hr style="border-color:var(--border);margin:1rem 1.5rem;"/>
    <a th:href="@{/auth/logout}"      class="sidebar-link"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>

<div class="main">
    <div th:if="${successMessage}" class="alert-success-rev mb-4">
        <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
    </div>

    <div class="section-card">
        <div class="section-hdr">
            <h5 style="margin:0;font-size:1.1rem;">All Orders</h5>
            <span style="color:var(--text-muted);font-size:0.82rem;"
                  th:text="${(orders != null ? orders.size() : 0)} + ' orders total'"></span>
        </div>
        <div class="table-responsive">
            <table class="table rev-table mb-0">
                <thead>
                <tr>
                    <th>Order ID</th><th>Buyer</th><th>Amount</th>
                    <th>Payment</th><th>Status</th><th>Date</th><th>Update Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${orders == null or orders.isEmpty()}">
                    <td colspan="7" style="text-align:center;color:var(--text-muted);padding:3rem;">
                        No orders yet.
                    </td>
                </tr>
                <tr th:each="order : ${orders}">
                    <td style="color:var(--orange);font-weight:700;"
                        th:text="'#' + ${order.id}"></td>
                    <td>
                        <div style="font-weight:500;font-size:0.9rem;"
                             th:text="${order.buyerName}"></div>
                        <div style="color:var(--text-muted);font-size:0.78rem;"
                             th:text="${order.buyerEmail}"></div>
                    </td>
                    <td style="color:var(--orange);font-weight:700;"
                        th:text="'₹' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></td>
                    <td style="font-size:0.85rem;" th:text="${order.paymentMethod ?: '—'}"></td>
                    <td>
                        <!-- FIX: th:switch on enum .name() is reliable; no nested ${} needed -->
                        <span th:switch="${order.status?.name()}">
                            <span th:case="'PENDING'"    class="status-pending">Pending</span>
                            <span th:case="'PROCESSING'" class="status-processing">Processing</span>
                            <span th:case="'SHIPPED'"    class="status-shipped">Shipped</span>
                            <span th:case="'DELIVERED'"  class="status-delivered">Delivered</span>
                            <span th:case="'CANCELLED'"  class="status-cancelled">Cancelled</span>
                        </span>
                    </td>
                    <td style="color:var(--text-muted);font-size:0.82rem;"
                        th:text="${order.orderedAt != null ? #temporals.format(order.orderedAt,'dd MMM yyyy') : '—'}"></td>
                    <td>
                        <form th:action="@{/admin/orders/status/{id}(id=${order.id})}"
                              method="post" class="d-flex gap-2 align-items-center">
                            <!--
                                FIX: th:value on <select> does NOT work in Thymeleaf — it is silently ignored.
                                The correct way to pre-select an option is th:selected on each <option>.
                                We compare the enum value directly (s == order.status) instead of .name() strings.
                            -->
                            <select name="status" class="status-select">
                                <option th:each="s : ${T(com.revshop.entity.Order.OrderStatus).values()}"
                                        th:value="${s.name()}"
                                        th:text="${s.name()}"
                                        th:selected="${s == order.status}"></option>
                            </select>
                            <button type="submit" class="btn-update">
                                <i class="bi bi-check"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
