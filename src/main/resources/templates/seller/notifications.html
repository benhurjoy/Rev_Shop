<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Notifications – RevShop Seller</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root{--navy:#0A1628;--navy-mid:#112240;--navy-light:#1E3A5F;--orange:#FF6B35;--gold:#FFB347;--text-light:#E8EDF5;--text-muted:#8899AA;--card-bg:#112240;--border:rgba(255,107,53,0.2);}
        body{background:var(--navy);color:var(--text-light);font-family:'DM Sans',sans-serif;margin:0;}
        h1,h2,h3,h4,h5{font-family:'Playfair Display',serif;}
        .revshop-navbar{background:linear-gradient(135deg,#0A1628,#1E3A5F);border-bottom:2px solid var(--orange);padding:0.75rem 0;position:sticky;top:0;z-index:1000;}
        .navbar-brand{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:800;color:var(--text-light)!important;}
        .navbar-brand span{color:var(--orange);}
        .nav-link{color:var(--text-muted)!important;font-weight:500;padding:0.5rem 1rem!important;border-radius:8px;transition:all 0.3s;}
        .nav-link:hover{color:var(--text-light)!important;background:rgba(255,107,53,0.15);}
        .sidebar{background:var(--card-bg);border-right:1px solid var(--border);min-height:calc(100vh - 66px);width:230px;position:fixed;top:66px;left:0;padding:1.5rem 0;}
        .sidebar-link{display:flex;align-items:center;gap:10px;padding:0.75rem 1.5rem;color:var(--text-muted);text-decoration:none;font-weight:500;font-size:0.9rem;border-left:3px solid transparent;transition:all 0.3s;}
        .sidebar-link:hover,.sidebar-link.active{color:var(--orange);background:rgba(255,107,53,0.08);border-left-color:var(--orange);}
        .main{margin-left:230px;padding:2rem;}
        .notif-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.5rem;margin-bottom:0.8rem;transition:all 0.3s;display:flex;align-items:start;gap:1rem;}
        .notif-card.unread{border-left:3px solid var(--orange);background:rgba(255,107,53,0.04);}
        .notif-card:hover{border-color:var(--orange);}
        .notif-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
        .ni-order{background:rgba(23,162,184,0.12);color:#5bc8d5;}
        .ni-stock{background:rgba(255,179,71,0.12);color:var(--gold);}
        .ni-general{background:rgba(255,107,53,0.12);color:var(--orange);}
        .notif-title{font-weight:600;font-size:0.92rem;color:var(--text-light);margin-bottom:0.2rem;}
        .notif-msg{color:var(--text-muted);font-size:0.85rem;}
        .notif-time{color:var(--text-muted);font-size:0.75rem;margin-top:0.3rem;}
        .unread-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);}
        .btn-mark-read{background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:3px 10px;font-size:0.75rem;cursor:pointer;transition:all 0.2s;}
        .btn-mark-read:hover{border-color:var(--orange);color:var(--orange);}
        .btn-mark-all{background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.25);color:var(--orange);border-radius:10px;padding:6px 16px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.3s;}
        .btn-mark-all:hover{background:rgba(255,107,53,0.2);}
        .empty-state{text-align:center;padding:4rem;color:var(--text-muted);}
        @media(max-width:768px){.sidebar{display:none;}.main{margin-left:0;padding:1rem;}}
    </style>
</head>
<body>
<nav class="revshop-navbar navbar">
    <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/}">Rev<span>Shop</span></a>
        <a class="nav-link ms-auto" th:href="@{/auth/logout}">
            <i class="bi bi-box-arrow-right"></i>
        </a>
    </div>
</nav>

<div class="sidebar">
    <a th:href="@{/seller/dashboard}"     class="sidebar-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a th:href="@{/seller/products}"      class="sidebar-link"><i class="bi bi-box-seam"></i> My Products</a>
    <a th:href="@{/seller/products/add}"  class="sidebar-link"><i class="bi bi-plus-circle"></i> Add Product</a>
    <a th:href="@{/seller/low-stock}"     class="sidebar-link"><i class="bi bi-exclamation-triangle"></i> Low Stock</a>
    <a th:href="@{/seller/notifications}" class="sidebar-link active"><i class="bi bi-bell"></i> Notifications</a>
</div>

<div class="main" style="max-width:calc(100% - 230px);">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 style="margin:0;">Notifications</h2>
            <p style="color:var(--text-muted);margin:0;font-size:0.88rem;"
               th:text="${unreadCount} + ' unread'"></p>
        </div>
        <form th:if="${unreadCount > 0}"
              th:action="@{/seller/notifications/read-all}" method="post">
            <button type="submit" class="btn-mark-all">
                <i class="bi bi-check-all me-1"></i>Mark All Read
            </button>
        </form>
    </div>

    <div style="max-width:680px;">
        <div th:if="${notifications == null or notifications.isEmpty()}" class="empty-state">
            <i class="bi bi-bell-slash" style="font-size:4rem;opacity:0.15;display:block;margin-bottom:1rem;"></i>
            <h5 style="color:var(--text-light);">No notifications yet</h5>
        </div>

        <div th:each="notif : ${notifications}"
             class="notif-card"
             th:classappend="${!notif.read} ? ' unread' : ''">
            <div class="notif-icon"
                 th:classappend="${notif.type?.name()?.contains('ORDER') ? ' ni-order' : (notif.type?.name() == 'LOW_STOCK' ? ' ni-stock' : ' ni-general')}">
                <i th:class="${notif.type?.name() == 'LOW_STOCK'} ? 'bi bi-exclamation-triangle' : 'bi bi-bell'"></i>
            </div>
            <div class="flex-grow-1">
                <div class="notif-title" th:text="${notif.title}"></div>
                <div class="notif-msg" th:text="${notif.message}"></div>
                <div class="notif-time"
                     th:text="${#temporals.format(notif.createdAt,'dd MMM yyyy, hh:mm a')}"></div>
            </div>
            <div class="d-flex flex-column align-items-end gap-2">
                <div class="unread-dot" th:if="${!notif.read}"></div>
                <form th:if="${!notif.read}"
                      th:action="@{/seller/notifications/read/{id}(id=${notif.id})}"
                      method="post">
                    <button type="submit" class="btn-mark-read">
                        <i class="bi bi-check me-1"></i>Read
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
