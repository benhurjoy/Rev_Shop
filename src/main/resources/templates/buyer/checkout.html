<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Checkout – RevShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root{--navy:#0A1628;--navy-mid:#112240;--navy-light:#1E3A5F;--orange:#FF6B35;--gold:#FFB347;--text-light:#E8EDF5;--text-muted:#8899AA;--card-bg:#112240;--border:rgba(255,107,53,0.2);}
        body{background:var(--navy);color:var(--text-light);font-family:'DM Sans',sans-serif;}
        h1,h2,h3,h4,h5{font-family:'Playfair Display',serif;}
        .revshop-navbar{background:linear-gradient(135deg,#0A1628,#1E3A5F);border-bottom:2px solid var(--orange);padding:0.75rem 0;position:sticky;top:0;z-index:1000;}
        .navbar-brand{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:800;color:var(--text-light)!important;}
        .navbar-brand span{color:var(--orange);}
        .nav-link{color:var(--text-muted)!important;font-weight:500;padding:0.5rem 1rem!important;border-radius:8px;transition:all 0.3s;}
        .nav-link:hover{color:var(--text-light)!important;background:rgba(255,107,53,0.15);}
        .checkout-steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:2.5rem;}
        .step{display:flex;align-items:center;gap:8px;padding:0.6rem 1.2rem;border-radius:30px;font-size:0.85rem;font-weight:600;}
        .step.active{background:rgba(255,107,53,0.12);color:var(--orange);border:1px solid rgba(255,107,53,0.3);}
        .step.done{color:var(--text-muted);}
        .step-line{width:40px;height:1px;background:var(--border);}
        .section-card{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:2rem;margin-bottom:1.5rem;}
        .form-label{color:var(--text-muted);font-size:0.83rem;font-weight:500;margin-bottom:0.4rem;}
        .form-control,.form-select{background:rgba(255,255,255,0.05)!important;border:1.5px solid rgba(255,107,53,0.2)!important;border-radius:12px!important;color:var(--text-light)!important;padding:0.75rem 1rem!important;font-family:'DM Sans',sans-serif;transition:all 0.3s;}
        .form-control:focus,.form-select:focus{border-color:var(--orange)!important;box-shadow:0 0 0 3px rgba(255,107,53,0.15)!important;background:rgba(255,255,255,0.08)!important;}
        .form-control::placeholder{color:var(--text-muted)!important;}
        .form-select option{background:var(--navy-mid);}
        .text-danger{color:#ff8fa3!important;font-size:0.8rem;}
        .payment-option{border:2px solid var(--border);border-radius:14px;padding:1.2rem;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;gap:1rem;}
        .payment-option:hover{border-color:var(--orange);background:rgba(255,107,53,0.04);}
        .payment-option.selected{border-color:var(--orange);background:rgba(255,107,53,0.08);}
        .payment-option input{display:none;}
        .pay-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
        .pay-icon.cod{background:rgba(40,167,69,0.12);color:#75f5a0;}
        .pay-icon.rzp{background:rgba(23,162,184,0.12);color:#5bc8d5;}
        .order-summary{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:1.8rem;position:sticky;top:80px;}
        .summary-row{display:flex;justify-content:space-between;padding:0.6rem 0;border-bottom:1px solid rgba(255,107,53,0.08);font-size:0.9rem;}
        .summary-row:last-child{border:none;}
        .summary-total{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--orange);}
        .cart-mini-item{display:flex;gap:0.8rem;align-items:center;padding:0.7rem 0;border-bottom:1px solid rgba(255,107,53,0.06);}
        .cart-mini-img{width:42px;height:42px;border-radius:8px;object-fit:cover;border:1px solid var(--border);}
        .cart-mini-ph{width:42px;height:42px;border-radius:8px;background:var(--navy-light);display:flex;align-items:center;justify-content:center;color:var(--text-muted);flex-shrink:0;}
        .btn-place{background:linear-gradient(135deg,var(--orange),#e85d2b);color:white;border:none;border-radius:14px;padding:1rem;font-weight:700;font-size:1rem;width:100%;transition:all 0.3s;box-shadow:0 6px 20px rgba(255,107,53,0.35);margin-top:1rem;}
        .btn-place:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(255,107,53,0.5);color:white;}
        .alert-error-rev{background:rgba(220,53,69,0.12);border:1px solid rgba(220,53,69,0.3);color:#ff8fa3;border-radius:10px;padding:0.8rem 1rem;}
        .alert-success-rev{background:rgba(40,167,69,0.12);border:1px solid rgba(40,167,69,0.3);color:#75f5a0;border-radius:10px;padding:0.8rem 1rem;}

        /* ── Coupon ── */
        .coupon-input{background:rgba(255,255,255,0.05)!important;border:1.5px solid rgba(255,107,53,0.2)!important;border-radius:12px!important;color:var(--text-light)!important;padding:0.75rem 1rem!important;font-family:'DM Sans',sans-serif;transition:all 0.3s;flex:1;outline:none;text-transform:uppercase;letter-spacing:1px;}
        .coupon-input:focus{border-color:var(--orange)!important;box-shadow:0 0 0 3px rgba(255,107,53,0.15)!important;}
        .coupon-input::placeholder{color:var(--text-muted)!important;text-transform:none;letter-spacing:normal;}
        .btn-apply-coupon{background:rgba(255,107,53,0.1);border:1.5px solid rgba(255,107,53,0.3);color:var(--orange);border-radius:12px;padding:0.75rem 1.2rem;font-weight:600;font-size:0.9rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
        .btn-apply-coupon:hover{background:rgba(255,107,53,0.2);}
        .coupon-applied-badge{background:rgba(40,167,69,0.08);border:1px solid rgba(40,167,69,0.3);border-radius:12px;padding:0.9rem 1.1rem;display:flex;align-items:center;justify-content:space-between;}
        .btn-remove-coupon{background:none;border:none;color:#ff8fa3;font-size:0.82rem;cursor:pointer;padding:0;transition:color 0.2s;}
        .btn-remove-coupon:hover{color:#ff4d6d;}
        /* ── Available coupons list ── */
        .available-coupons{margin-top:1.1rem;}
        .available-coupons-title{font-size:0.78rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);font-weight:600;margin-bottom:0.6rem;}
        .coupon-chip{display:flex;align-items:center;justify-content:space-between;background:rgba(255,107,53,0.05);border:1px dashed rgba(255,107,53,0.3);border-radius:10px;padding:0.65rem 0.9rem;margin-bottom:0.5rem;cursor:pointer;transition:all 0.2s;gap:0.8rem;}
        .coupon-chip:hover{background:rgba(255,107,53,0.1);border-color:var(--orange);}
        .coupon-chip-code{font-family:monospace;font-weight:700;font-size:0.9rem;color:var(--orange);letter-spacing:1.5px;}
        .coupon-chip-desc{font-size:0.78rem;color:var(--text-muted);}
        .coupon-chip-apply{font-size:0.75rem;color:var(--orange);font-weight:600;white-space:nowrap;}
    </style>
</head>
<body>
<nav class="revshop-navbar navbar">
    <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/buyer/home}">Rev<span>Shop</span></a>
        <a class="nav-link ms-auto" th:href="@{/buyer/cart}">
            <i class="bi bi-arrow-left me-1"></i>Back to Cart
        </a>
    </div>
</nav>

<div class="container py-5">

    <div class="checkout-steps">
        <div class="step done"><i class="bi bi-cart-check"></i> Cart</div>
        <div class="step-line"></div>
        <div class="step active"><i class="bi bi-truck"></i> Delivery</div>
        <div class="step-line"></div>
        <div class="step done" style="color:var(--text-muted);opacity:0.5;">
            <i class="bi bi-credit-card"></i> Payment
        </div>
    </div>

    <!-- Flash alerts -->
    <div th:if="${successMessage}" class="alert-success-rev mb-4">
        <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert-error-rev mb-4">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
    </div>

    <div class="row g-4">

        <!-- Left: Coupon + Address + Payment -->
        <div class="col-lg-7">

            <!-- ── Coupon Section ──────────────────────────────── -->
            <div class="section-card">
                <h5 class="mb-3">
                    <i class="bi bi-ticket-perforated me-2" style="color:var(--orange);"></i>
                    Have a Coupon?
                </h5>

                <!-- Coupon already applied -->
                <div th:if="${appliedCoupon != null and appliedCoupon != ''}"
                     class="coupon-applied-badge">
                    <div class="d-flex align-items-center gap-2">
                        <i class="bi bi-check-circle-fill" style="color:#75f5a0;font-size:1.1rem;"></i>
                        <div>
                            <strong style="color:#75f5a0;letter-spacing:1px;"
                                    th:text="${appliedCoupon}"></strong>
                            <span style="color:var(--text-muted);font-size:0.82rem;margin-left:0.5rem;">
                                applied — you save
                                <strong style="color:#75f5a0;"
                                        th:text="'₹' + ${#numbers.formatDecimal(discount, 1, 2)}"></strong>
                            </span>
                        </div>
                    </div>
                    <form th:action="@{/buyer/checkout/remove-coupon}" method="post" style="margin:0;">
                        <button type="submit" class="btn-remove-coupon">
                            <i class="bi bi-x-circle me-1"></i>Remove
                        </button>
                    </form>
                </div>

                <!-- Coupon input (shown when no coupon applied) -->
                <div th:unless="${appliedCoupon != null and appliedCoupon != ''}">
                    <form th:action="@{/buyer/checkout/apply-coupon}" method="post">
                        <div class="d-flex gap-2">
                            <input type="text" name="couponCode" id="couponCodeInput"
                                   class="coupon-input" placeholder="Enter coupon code"/>
                            <button type="submit" class="btn-apply-coupon">
                                <i class="bi bi-tag me-1"></i>Apply
                            </button>
                        </div>
                    </form>

                    <!-- Available coupons list -->
                    <div class="available-coupons"
                         th:if="${availableCoupons != null and !availableCoupons.isEmpty()}">
                        <div class="available-coupons-title">
                            <i class="bi bi-gift me-1"></i>Available Offers
                        </div>
                        <div th:each="c : ${availableCoupons}" class="coupon-chip"
                             th:data-code="${c.code}" onclick="applyCouponCode(this)">
                            <div>
                                <div class="coupon-chip-code" th:text="${c.code}"></div>
                                <div class="coupon-chip-desc">
                                    <!-- Percentage type -->
                                    <span th:if="${c.discountType.name() == 'PERCENTAGE'}">
                                        <strong th:text="${c.discountValue} + '%'"></strong> off
                                        <span th:if="${c.minimumOrderAmount != null and c.minimumOrderAmount > 0}">
                                            on orders above ₹<span th:text="${c.minimumOrderAmount}"></span>
                                        </span>
                                    </span>
                                    <!-- Fixed type -->
                                    <span th:if="${c.discountType.name() == 'FIXED'}">
                                        Flat ₹<strong th:text="${c.discountValue}"></strong> off
                                        <span th:if="${c.minimumOrderAmount != null and c.minimumOrderAmount > 0}">
                                            on orders above ₹<span th:text="${c.minimumOrderAmount}"></span>
                                        </span>
                                    </span>
                                    &nbsp;·&nbsp;Expires
                                    <span th:text="${#temporals.format(c.expiryDate, 'dd MMM')}"></span>
                                </div>
                            </div>
                            <span class="coupon-chip-apply">
                                <i class="bi bi-cursor me-1"></i>Tap to apply
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── Delivery Address + Payment (one form) ─────── -->
            <div class="section-card">
                <h5 class="mb-4">
                    <i class="bi bi-geo-alt me-2" style="color:var(--orange);"></i>
                    Delivery Address
                </h5>

                <form th:action="@{/buyer/checkout}" th:object="${checkoutDTO}"
                      method="post" id="checkoutForm">

                    <!-- Carry coupon state into order submission -->
                    <input type="hidden" name="appliedCoupon"
                           th:value="${appliedCoupon != null ? appliedCoupon : ''}"/>
                    <input type="hidden" name="discount"
                           th:value="${discount != null ? discount : 0}"/>

                    <div class="mb-3">
                        <label class="form-label">Street Address *</label>
                        <input type="text" class="form-control" th:field="*{shippingAddress}"
                               placeholder="House no, Street, Area"/>
                        <div class="text-danger" th:if="${#fields.hasErrors('shippingAddress')}"
                             th:errors="*{shippingAddress}"></div>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">City *</label>
                            <input type="text" class="form-control" th:field="*{city}" placeholder="City"/>
                            <div class="text-danger" th:if="${#fields.hasErrors('city')}"
                                 th:errors="*{city}"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">State *</label>
                            <input type="text" class="form-control" th:field="*{state}" placeholder="State"/>
                            <div class="text-danger" th:if="${#fields.hasErrors('state')}"
                                 th:errors="*{state}"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Pincode *</label>
                            <input type="text" class="form-control" th:field="*{pincode}"
                                   placeholder="6-digit pincode" maxlength="6"/>
                            <div class="text-danger" th:if="${#fields.hasErrors('pincode')}"
                                 th:errors="*{pincode}"></div>
                        </div>
                    </div>

                    <h5 class="mt-4 mb-3">
                        <i class="bi bi-credit-card me-2" style="color:var(--orange);"></i>
                        Payment Method
                    </h5>
                    <div class="d-flex flex-column gap-3">
                        <label class="payment-option" id="pay-cod"
                               onclick="selectPayment('COD','pay-cod')">
                            <input type="radio" th:field="*{paymentMethod}" value="COD"/>
                            <div class="pay-icon cod"><i class="bi bi-cash-coin"></i></div>
                            <div>
                                <div style="font-weight:600;color:var(--text-light);">Cash on Delivery</div>
                                <div style="color:var(--text-muted);font-size:0.82rem;">Pay when your order arrives</div>
                            </div>
                            <i class="bi bi-check-circle-fill ms-auto"
                               style="color:var(--orange);display:none;" id="check-cod"></i>
                        </label>

                        <label class="payment-option" id="pay-rzp"
                               onclick="selectPayment('RAZORPAY','pay-rzp')">
                            <input type="radio" th:field="*{paymentMethod}" value="RAZORPAY"/>
                            <div class="pay-icon rzp"><i class="bi bi-credit-card-2-front"></i></div>
                            <div>
                                <div style="font-weight:600;color:var(--text-light);">Pay Online (Razorpay)</div>
                                <div style="color:var(--text-muted);font-size:0.82rem;">UPI, Cards, Net Banking, Wallets</div>
                            </div>
                            <i class="bi bi-check-circle-fill ms-auto"
                               style="color:var(--orange);display:none;" id="check-rzp"></i>
                        </label>
                    </div>
                    <div class="text-danger mt-2"
                         th:if="${#fields.hasErrors('paymentMethod')}"
                         th:errors="*{paymentMethod}"></div>

                    <button type="submit" class="btn-place">
                        <i class="bi bi-bag-check me-2"></i>Place Order
                    </button>
                    <div class="text-center mt-3" style="color:var(--text-muted);font-size:0.78rem;">
                        <i class="bi bi-shield-check me-1" style="color:var(--orange);"></i>
                        Secure &amp; encrypted checkout
                    </div>
                </form>
            </div>
        </div>

        <!-- Right: Order Summary -->
        <div class="col-lg-5">
            <div class="order-summary">
                <h5 class="mb-3">Order Summary</h5>

                <div class="mb-3">
                    <div class="cart-mini-item" th:each="item : ${cartItems}">
                        <img th:if="${item.product.imageUrl != null}"
                             th:src="${item.product.imageUrl}"
                             class="cart-mini-img" th:alt="${item.product.name}"/>
                        <div class="cart-mini-ph" th:unless="${item.product.imageUrl != null}">
                            <i class="bi bi-image"></i>
                        </div>
                        <div class="flex-grow-1">
                            <div style="font-size:0.85rem;font-weight:500;"
                                 th:text="${item.product.name}"></div>
                            <div style="color:var(--text-muted);font-size:0.78rem;"
                                 th:text="'Qty: ' + ${item.quantity}"></div>
                        </div>
                        <div style="color:var(--orange);font-weight:600;font-size:0.9rem;"
                             th:text="'₹' + ${#numbers.formatDecimal(item.product.price, 1, 2)}"></div>
                    </div>
                </div>

                <div class="summary-row">
                    <span style="color:var(--text-muted);">Subtotal</span>
                    <span th:text="'₹' + ${#numbers.formatDecimal(total, 1, 2)}"></span>
                </div>

                <!-- Coupon discount row — only when applied -->
                <div class="summary-row" th:if="${discount != null and discount > 0}">
                    <span style="color:#75f5a0;">
                        <i class="bi bi-tag-fill me-1"></i>
                        Coupon (<span th:text="${appliedCoupon}"></span>)
                    </span>
                    <span style="color:#75f5a0;"
                          th:text="'− ₹' + ${#numbers.formatDecimal(discount, 1, 2)}"></span>
                </div>

                <div class="summary-row">
                    <span style="color:var(--text-muted);">Shipping</span>
                    <span style="color:#75f5a0;">FREE</span>
                </div>
                <div class="summary-row">
                    <span style="color:var(--text-muted);">GST (18%)</span>
                    <span th:text="'₹' + ${#numbers.formatDecimal(gst, 1, 2)}"></span>
                </div>
                <div class="summary-row mt-1">
                    <span style="font-weight:700;font-size:1rem;">Total</span>
                    <span class="summary-total"
                          th:text="'₹' + ${#numbers.formatDecimal(grandTotal, 1, 2)}"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function selectPayment(method, id) {
        document.querySelectorAll('.payment-option').forEach(el => el.classList.remove('selected'));
        document.querySelectorAll('[id^="check-"]').forEach(el => el.style.display = 'none');
        document.getElementById(id).classList.add('selected');
        document.getElementById('check-' + method.toLowerCase().replace('razorpay', 'rzp')).style.display = 'block';
        document.querySelector('#' + id + ' input[type=radio]').checked = true;
    }

    // Click a coupon chip → fill the input and submit the apply form automatically
    // Uses data-code attribute to avoid Thymeleaf 3.1 security restriction on
    // string expressions inside th:onclick event handlers
    function applyCouponCode(el) {
        const code  = el.getAttribute('data-code');
        const input = document.getElementById('couponCodeInput');
        if (!input || !code) return;
        input.value = code;
        input.closest('form').submit();
    }
</script>
</body>
</html>
