<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Checkout – RevShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root{--navy:#0A1628;--navy-mid:#112240;--navy-light:#1E3A5F;--orange:#FF6B35;--gold:#FFB347;--text-light:#E8EDF5;--text-muted:#8899AA;--card-bg:#112240;--border:rgba(255,107,53,0.2);}
        body{background:var(--navy);color:var(--text-light);font-family:'DM Sans',sans-serif;}
        h1,h2,h3,h4,h5{font-family:'Playfair Display',serif;}
        .revshop-navbar{background:linear-gradient(135deg,#0A1628,#1E3A5F);border-bottom:2px solid var(--orange);padding:0.75rem 0;position:sticky;top:0;z-index:1000;}
        .navbar-brand{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:800;color:var(--text-light)!important;}
        .navbar-brand span{color:var(--orange);}
        .nav-link{color:var(--text-muted)!important;font-weight:500;padding:0.5rem 1rem!important;border-radius:8px;transition:all 0.3s;}
        .nav-link:hover{color:var(--text-light)!important;background:rgba(255,107,53,0.15);}

        /* Steps */
        .checkout-steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:2.5rem;}
        .step{display:flex;align-items:center;gap:8px;padding:0.6rem 1.2rem;border-radius:30px;font-size:0.85rem;font-weight:600;}
        .step.active{background:rgba(255,107,53,0.12);color:var(--orange);border:1px solid rgba(255,107,53,0.3);}
        .step.done{color:var(--text-muted);}
        .step-line{width:40px;height:1px;background:var(--border);}

        /* Form */
        .section-card{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:2rem;margin-bottom:1.5rem;}
        .form-label{color:var(--text-muted);font-size:0.83rem;font-weight:500;margin-bottom:0.4rem;}
        .form-control,.form-select{background:rgba(255,255,255,0.05)!important;border:1.5px solid rgba(255,107,53,0.2)!important;border-radius:12px!important;color:var(--text-light)!important;padding:0.75rem 1rem!important;font-family:'DM Sans',sans-serif;transition:all 0.3s;}
        .form-control:focus,.form-select:focus{border-color:var(--orange)!important;box-shadow:0 0 0 3px rgba(255,107,53,0.15)!important;background:rgba(255,255,255,0.08)!important;}
        .form-control::placeholder{color:var(--text-muted)!important;}
        .form-select option{background:var(--navy-mid);}
        .text-danger{color:#ff8fa3!important;font-size:0.8rem;}

        /* Payment method selector */
        .payment-option{border:2px solid var(--border);border-radius:14px;padding:1.2rem;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;gap:1rem;}
        .payment-option:hover{border-color:var(--orange);background:rgba(255,107,53,0.04);}
        .payment-option.selected{border-color:var(--orange);background:rgba(255,107,53,0.08);}
        .payment-option input{display:none;}
        .pay-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
        .pay-icon.cod{background:rgba(40,167,69,0.12);color:#75f5a0;}
        .pay-icon.rzp{background:rgba(23,162,184,0.12);color:#5bc8d5;}

        /* Order Summary */
        .order-summary{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:1.8rem;position:sticky;top:80px;}
        .summary-row{display:flex;justify-content:space-between;padding:0.6rem 0;border-bottom:1px solid rgba(255,107,53,0.08);font-size:0.9rem;}
        .summary-row:last-child{border:none;}
        .summary-total{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--orange);}
        .cart-mini-item{display:flex;gap:0.8rem;align-items:center;padding:0.7rem 0;border-bottom:1px solid rgba(255,107,53,0.06);}
        .cart-mini-img{width:42px;height:42px;border-radius:8px;object-fit:cover;border:1px solid var(--border);}
        .cart-mini-ph{width:42px;height:42px;border-radius:8px;background:var(--navy-light);display:flex;align-items:center;justify-content:center;color:var(--text-muted);flex-shrink:0;}

        .btn-place{background:linear-gradient(135deg,var(--orange),#e85d2b);color:white;border:none;border-radius:14px;padding:1rem;font-weight:700;font-size:1rem;width:100%;transition:all 0.3s;box-shadow:0 6px 20px rgba(255,107,53,0.35);margin-top:1rem;}
        .btn-place:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(255,107,53,0.5);color:white;}
        .alert-error-rev{background:rgba(220,53,69,0.12);border:1px solid rgba(220,53,69,0.3);color:#ff8fa3;border-radius:10px;padding:0.8rem 1rem;}
    </style>
</head>
<body>
<nav class="revshop-navbar navbar">
    <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/buyer/home}">Rev<span>Shop</span></a>
        <a class="nav-link ms-auto" th:href="@{/buyer/cart}">
            <i class="bi bi-arrow-left me-1"></i>Back to Cart
        </a>
    </div>
</nav>

<div class="container py-5">

    <!-- Steps -->
    <div class="checkout-steps">
        <div class="step done"><i class="bi bi-cart-check"></i> Cart</div>
        <div class="step-line"></div>
        <div class="step active"><i class="bi bi-truck"></i> Delivery</div>
        <div class="step-line"></div>
        <div class="step done" style="color:var(--text-muted);opacity:0.5;">
            <i class="bi bi-credit-card"></i> Payment
        </div>
    </div>

    <div th:if="${errorMessage}" class="alert-error-rev mb-4">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
    </div>

    <form th:action="@{/buyer/checkout}" th:object="${checkoutDTO}" method="post">
        <div class="row g-4">

            <!-- Left: Address + Payment -->
            <div class="col-lg-7">

                <!-- Shipping Address -->
                <div class="section-card">
                    <h5 class="mb-4">
                        <i class="bi bi-geo-alt me-2" style="color:var(--orange);"></i>
                        Delivery Address
                    </h5>

                    <div class="mb-3">
                        <label class="form-label">Street Address *</label>
                        <input type="text" class="form-control" th:field="*{shippingAddress}"
                               placeholder="House no, Street, Area"/>
                        <div class="text-danger" th:if="${#fields.hasErrors('shippingAddress')}"
                             th:errors="*{shippingAddress}"></div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">City *</label>
                            <input type="text" class="form-control" th:field="*{city}"
                                   placeholder="City"/>
                            <div class="text-danger" th:if="${#fields.hasErrors('city')}"
                                 th:errors="*{city}"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">State *</label>
                            <input type="text" class="form-control" th:field="*{state}"
                                   placeholder="State"/>
                            <div class="text-danger" th:if="${#fields.hasErrors('state')}"
                                 th:errors="*{state}"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Pincode *</label>
                            <input type="text" class="form-control" th:field="*{pincode}"
                                   placeholder="6-digit pincode" maxlength="6"/>
                            <div class="text-danger" th:if="${#fields.hasErrors('pincode')}"
                                 th:errors="*{pincode}"></div>
                        </div>
                    </div>
                </div>

                <!-- Payment Method -->
                <div class="section-card">
                    <h5 class="mb-4">
                        <i class="bi bi-credit-card me-2" style="color:var(--orange);"></i>
                        Payment Method
                    </h5>

                    <div class="d-flex flex-column gap-3">

                        <!-- COD -->
                        <label class="payment-option" id="pay-cod"
                               onclick="selectPayment('COD','pay-cod')">
                            <input type="radio" th:field="*{paymentMethod}" value="COD"/>
                            <div class="pay-icon cod"><i class="bi bi-cash-coin"></i></div>
                            <div>
                                <div style="font-weight:600;color:var(--text-light);">
                                    Cash on Delivery
                                </div>
                                <div style="color:var(--text-muted);font-size:0.82rem;">
                                    Pay when your order arrives
                                </div>
                            </div>
                            <i class="bi bi-check-circle-fill ms-auto"
                               style="color:var(--orange);display:none;" id="check-cod"></i>
                        </label>

                        <!-- Razorpay -->
                        <label class="payment-option" id="pay-rzp"
                               onclick="selectPayment('RAZORPAY','pay-rzp')">
                            <input type="radio" th:field="*{paymentMethod}" value="RAZORPAY"/>
                            <div class="pay-icon rzp"><i class="bi bi-credit-card-2-front"></i></div>
                            <div>
                                <div style="font-weight:600;color:var(--text-light);">
                                    Pay Online (Razorpay)
                                </div>
                                <div style="color:var(--text-muted);font-size:0.82rem;">
                                    UPI, Cards, Net Banking, Wallets
                                </div>
                            </div>
                            <i class="bi bi-check-circle-fill ms-auto"
                               style="color:var(--orange);display:none;" id="check-rzp"></i>
                        </label>
                    </div>

                    <div class="text-danger mt-2"
                         th:if="${#fields.hasErrors('paymentMethod')}"
                         th:errors="*{paymentMethod}"></div>
                </div>
            </div>

            <!-- Right: Order Summary -->
            <div class="col-lg-5">
                <div class="order-summary">
                    <h5 class="mb-3">Order Summary</h5>

                    <!-- Cart Items Mini -->
                    <div class="mb-3">
                        <div class="cart-mini-item" th:each="item : ${cartItems}">
                            <img th:if="${item.product.imageUrl != null}"
                                 th:src="${item.product.imageUrl}"
                                 class="cart-mini-img" th:alt="${item.product.name}"/>
                            <div class="cart-mini-ph" th:unless="${item.product.imageUrl != null}">
                                <i class="bi bi-image"></i>
                            </div>
                            <div class="flex-grow-1">
                                <div style="font-size:0.85rem;font-weight:500;"
                                     th:text="${item.product.name}"></div>
                                <div style="color:var(--text-muted);font-size:0.78rem;"
                                     th:text="'Qty: ' + ${item.quantity}"></div>
                            </div>
                            <div style="color:var(--orange);font-weight:600;font-size:0.9rem;"
                                 th:text="'₹' + ${item.product.price}"></div>
                        </div>
                    </div>

                    <!-- Totals -->
                    <div class="summary-row">
                        <span style="color:var(--text-muted);">Subtotal</span>
                        <span th:text="'₹' + ${total}"></span>
                    </div>
                    <div class="summary-row">
                        <span style="color:var(--text-muted);">Shipping</span>
                        <span style="color:#75f5a0;">FREE</span>
                    </div>
                    <div class="summary-row">
                        <span style="color:var(--text-muted);">GST (18%)</span>
                        <span th:text="'₹' + ${total.multiply(new java.math.BigDecimal('0.18')).setScale(2,java.math.RoundingMode.HALF_UP)}"></span>
                    </div>
                    <div class="summary-row mt-1">
                        <span style="font-weight:700;font-size:1rem;">Total</span>
                        <span class="summary-total"
                              th:text="'₹' + ${total.multiply(new java.math.BigDecimal('1.18')).setScale(2,java.math.RoundingMode.HALF_UP)}"></span>
                    </div>

                    <button type="submit" class="btn-place">
                        <i class="bi bi-bag-check me-2"></i>Place Order
                    </button>

                    <div class="text-center mt-3"
                         style="color:var(--text-muted);font-size:0.78rem;">
                        <i class="bi bi-shield-check me-1" style="color:var(--orange);"></i>
                        Secure & encrypted checkout
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let selected = null;
    function selectPayment(method, id) {
        document.querySelectorAll('.payment-option').forEach(el => {
            el.classList.remove('selected');
        });
        document.querySelectorAll('[id^="check-"]').forEach(el => {
            el.style.display = 'none';
        });
        document.getElementById(id).classList.add('selected');
        document.getElementById('check-' + method.toLowerCase().replace('razorpay','rzp'))
            .style.display = 'block';
        selected = method;
    }
</script>
</body>
</html>
