<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Wishlist – RevShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root{--navy:#0A1628;--navy-mid:#112240;--navy-light:#1E3A5F;--orange:#FF6B35;--gold:#FFB347;--text-light:#E8EDF5;--text-muted:#8899AA;--card-bg:#112240;--border:rgba(255,107,53,0.2);}
        body{background:var(--navy);color:var(--text-light);font-family:'DM Sans',sans-serif;}
        h1,h2,h3,h4,h5{font-family:'Playfair Display',serif;}
        .revshop-navbar{background:linear-gradient(135deg,#0A1628,#1E3A5F);border-bottom:2px solid var(--orange);padding:0.75rem 0;position:sticky;top:0;z-index:1000;}
        .navbar-brand{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:800;color:var(--text-light)!important;}
        .navbar-brand span{color:var(--orange);}
        .nav-link{color:var(--text-muted)!important;font-weight:500;padding:0.5rem 1rem!important;border-radius:8px;transition:all 0.3s;}
        .nav-link:hover{color:var(--text-light)!important;background:rgba(255,107,53,0.15);}
        .product-card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all 0.35s;height:100%;}
        .product-card:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(255,107,53,0.18);border-color:var(--orange);}
        .img-wrap{position:relative;height:200px;overflow:hidden;}
        .img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s;}
        .product-card:hover .img-wrap img{transform:scale(1.07);}
        .img-ph{width:100%;height:200px;background:linear-gradient(135deg,var(--navy-light),var(--card-bg));display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--text-muted);}
        .card-body{padding:1.1rem;}
        .p-cat{font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--orange);font-weight:600;}
        .p-name{font-weight:600;font-size:0.92rem;color:var(--text-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0.3rem 0;}
        .p-price{color:var(--orange);font-weight:700;font-size:1.05rem;}
        .p-mrp{color:var(--text-muted);font-size:0.78rem;text-decoration:line-through;}
        .btn-move{background:linear-gradient(135deg,var(--orange),#e85d2b);color:white;border:none;border-radius:8px;padding:0.55rem 1rem;font-weight:600;font-size:0.83rem;width:100%;cursor:pointer;transition:all 0.3s;}
        .btn-move:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,107,53,0.4);}
        .btn-remove-wish{background:rgba(220,53,69,0.1);border:1px solid rgba(220,53,69,0.25);color:#ff8fa3;border-radius:8px;padding:0.5rem;cursor:pointer;transition:all 0.2s;}
        .btn-remove-wish:hover{background:rgba(220,53,69,0.2);}
        .empty-state{text-align:center;padding:4rem;color:var(--text-muted);}
        .empty-state i{font-size:5rem;opacity:0.15;display:block;margin-bottom:1rem;}
        .alert-success-rev{background:rgba(40,167,69,0.12);border:1px solid rgba(40,167,69,0.3);color:#75f5a0;border-radius:10px;padding:0.8rem 1rem;}
        .alert-error-rev{background:rgba(220,53,69,0.12);border:1px solid rgba(220,53,69,0.3);color:#ff8fa3;border-radius:10px;padding:0.8rem 1rem;}
    </style>
</head>
<body>
<nav class="revshop-navbar navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/buyer/home}">Rev<span>Shop</span></a>
        <div class="ms-auto d-flex gap-2">
            <a class="nav-link" th:href="@{/buyer/home}"><i class="bi bi-arrow-left me-1"></i>Shop</a>
            <a class="nav-link" th:href="@{/buyer/cart}"><i class="bi bi-cart3 me-1"></i>Cart</a>
            <a class="nav-link" th:href="@{/auth/logout}"><i class="bi bi-box-arrow-right"></i></a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <h2 class="mb-4">
        <i class="bi bi-heart-fill me-2" style="color:var(--orange);"></i>
        My Wishlist
        <span style="color:var(--text-muted);font-size:1rem;font-family:'DM Sans',sans-serif;"
              th:text="${'(' + (wishlist != null and wishlist.products != null ? wishlist.products.size() : 0) + ' items)'}"></span>
    </h2>

    <div th:if="${successMessage}" class="alert-success-rev mb-4">
        <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert-error-rev mb-4">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
    </div>

    <!-- Empty -->
    <div th:if="${wishlist == null or wishlist.products.isEmpty()}" class="empty-state">
        <i class="bi bi-heart"></i>
        <h4 style="color:var(--text-light);">Your wishlist is empty</h4>
        <p>Save items you love for later.</p>
        <a th:href="@{/buyer/home}"
           style="background:linear-gradient(135deg,var(--orange),#e85d2b);color:white;border:none;border-radius:12px;padding:0.8rem 2rem;font-weight:700;text-decoration:none;display:inline-block;">
            <i class="bi bi-bag me-2"></i>Start Shopping
        </a>
    </div>

    <div class="row g-3" th:if="${wishlist != null and !wishlist.products.isEmpty()}">
        <div class="col-6 col-md-4 col-lg-3"
             th:each="product : ${wishlist.products}">
            <div class="product-card">
                <div class="img-wrap">
                    <img th:if="${product.imageUrl != null}"
                         th:src="${product.imageUrl}" th:alt="${product.name}"/>
                    <div class="img-ph" th:unless="${product.imageUrl != null}">
                        <i class="bi bi-image"></i>
                    </div>
                </div>
                <div class="card-body">
                    <div class="p-cat" th:text="${product.category?.name}"></div>
                    <div class="p-name" th:text="${product.name}"></div>
                    <div class="d-flex align-items-baseline gap-2 mb-3">
                        <span class="p-price" th:text="'₹' + ${product.price}"></span>
                        <span class="p-mrp" th:if="${product.mrp != null}"
                              th:text="'₹' + ${product.mrp}"></span>
                    </div>
                    <div class="d-flex gap-2">
                        <form th:action="@{/buyer/wishlist/move-to-cart/{id}(id=${product.id})}"
                              method="post" style="flex:1;">
                            <button type="submit" class="btn-move">
                                <i class="bi bi-cart-plus me-1"></i>Move to Cart
                            </button>
                        </form>
                        <form th:action="@{/buyer/wishlist/remove/{id}(id=${product.id})}"
                              method="post">
                            <button type="submit" class="btn-remove-wish" title="Remove">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
