<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Shop – RevShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root{
            --navy:#0A1628;--navy-mid:#112240;--navy-light:#1E3A5F;
            --orange:#FF6B35;--gold:#FFB347;
            --text-light:#E8EDF5;--text-muted:#8899AA;
            --card-bg:#112240;--border:rgba(255,107,53,0.2);
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--navy);color:var(--text-light);font-family:'DM Sans',sans-serif;}
        h1,h2,h3,h4{font-family:'Playfair Display',serif;}

        /* ── Navbar ── */
        .revshop-navbar{
            background:linear-gradient(135deg,#0A1628,#1E3A5F);
            border-bottom:2px solid var(--orange);
            padding:0.75rem 0;position:sticky;top:0;z-index:1000;
            box-shadow:0 4px 20px rgba(0,0,0,0.4);
        }
        .navbar-brand{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:800;color:var(--text-light)!important;text-decoration:none;}
        .navbar-brand span{color:var(--orange);}
        .nav-link{color:var(--text-muted)!important;font-weight:500;padding:0.5rem 0.9rem!important;border-radius:8px;transition:all 0.3s;position:relative;}
        .nav-link:hover{color:var(--text-light)!important;background:rgba(255,107,53,0.15);}
        .nav-badge{
            background:var(--orange);color:white;border-radius:50%;
            font-size:0.6rem;font-weight:700;
            padding:2px 5px;position:absolute;top:4px;right:4px;
            min-width:16px;text-align:center;line-height:1.4;
        }

        /* ── Avatar dropdown ── */
        .dropdown-item{color:var(--text-muted);transition:all 0.2s;}
        .dropdown-item:hover{background:rgba(255,107,53,0.1)!important;color:var(--orange)!important;}
        .dropdown-toggle::after{display:none;}

        /* ── Search strip ── */
        .search-strip{background:var(--navy-mid);border-bottom:1px solid var(--border);padding:1rem 0;}
        .search-bar{
            background:var(--card-bg);border:1.5px solid var(--border);
            border-radius:12px;display:flex;align-items:center;overflow:hidden;
            transition:border-color 0.3s;
        }
        .search-bar:focus-within{border-color:var(--orange);}
        .search-bar input{
            background:transparent;border:none;color:var(--text-light);
            padding:0.75rem 1rem;flex:1;font-family:'DM Sans',sans-serif;
            font-size:0.95rem;outline:none;
        }
        .search-bar input::placeholder{color:var(--text-muted);}
        .search-bar button{
            background:linear-gradient(135deg,var(--orange),#e85d2b);
            border:none;color:white;padding:0.75rem 1.3rem;
            cursor:pointer;font-weight:600;transition:all 0.3s;
            white-space:nowrap;
        }
        .search-bar button:hover{background:linear-gradient(135deg,#e85d2b,#d14e22);}

        /* ── Category chips ── */
        .cat-chip{
            display:inline-flex;align-items:center;gap:5px;
            background:var(--card-bg);border:1.5px solid var(--border);
            border-radius:20px;padding:0.45rem 1rem;
            color:var(--text-muted);font-size:0.82rem;font-weight:500;
            cursor:pointer;transition:all 0.3s;text-decoration:none;white-space:nowrap;
        }
        .cat-chip:hover,.cat-chip.active{
            background:rgba(255,107,53,0.12);
            border-color:var(--orange);color:var(--orange);
        }

        /* ── Product cards ── */
        .product-card{
            background:var(--card-bg);border:1px solid var(--border);
            border-radius:16px;overflow:hidden;
            transition:all 0.35s;height:100%;
            display:flex;flex-direction:column;
        }
        .product-card:hover{
            transform:translateY(-6px);
            box-shadow:0 20px 50px rgba(255,107,53,0.18);
            border-color:var(--orange);
        }
        .img-wrap{position:relative;height:200px;overflow:hidden;flex-shrink:0;}
        .img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s;}
        .product-card:hover .img-wrap img{transform:scale(1.07);}
        .img-placeholder{
            width:100%;height:200px;
            background:linear-gradient(135deg,var(--navy-light),var(--card-bg));
            display:flex;align-items:center;justify-content:center;
            font-size:2.5rem;color:var(--text-muted);
        }
        .disc-badge{
            position:absolute;top:10px;left:10px;
            background:linear-gradient(135deg,var(--orange),#e85d2b);
            color:white;font-size:0.68rem;font-weight:700;
            padding:3px 8px;border-radius:6px;
        }
        .wish-form{position:absolute;top:10px;right:10px;}
        .wish-btn{
            width:32px;height:32px;border-radius:50%;
            background:rgba(10,22,40,0.8);border:1px solid var(--border);
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;transition:all 0.3s;color:var(--text-muted);
            padding:0;
        }
        .wish-btn:hover{background:rgba(255,107,53,0.2);border-color:var(--orange);color:var(--orange);}

        .card-body{padding:1rem;flex:1;display:flex;flex-direction:column;}
        .p-cat{font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--orange);font-weight:600;margin-bottom:0.25rem;}
        .p-name{font-weight:600;font-size:0.9rem;color:var(--text-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:0.4rem;}
        .stars{color:var(--gold);font-size:0.75rem;}
        .p-price{color:var(--orange);font-weight:700;font-size:1.05rem;}
        .p-mrp{color:var(--text-muted);font-size:0.75rem;text-decoration:line-through;}
        .card-actions{display:flex;gap:0.5rem;margin-top:auto;padding-top:0.75rem;}
        .btn-cart{
            background:linear-gradient(135deg,var(--orange),#e85d2b);
            color:white;border:none;border-radius:8px;
            padding:0.5rem 0.75rem;font-weight:600;font-size:0.82rem;
            flex:1;cursor:pointer;transition:all 0.3s;
        }
        .btn-cart:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,107,53,0.4);color:white;}
        .btn-cart:disabled{opacity:0.5;cursor:not-allowed;}
        .btn-view{
            background:rgba(255,107,53,0.08);
            border:1px solid var(--border);border-radius:8px;
            padding:0.5rem 0.65rem;color:var(--text-muted);
            display:flex;align-items:center;justify-content:center;
            text-decoration:none;transition:all 0.3s;flex-shrink:0;
        }
        .btn-view:hover{border-color:var(--orange);color:var(--orange);}

        /* ── Alerts ── */
        .alert-rev{border-radius:10px;padding:0.8rem 1rem;display:flex;align-items:center;gap:0.6rem;font-size:0.9rem;}
        .alert-success-rev{background:rgba(40,167,69,0.1);border:1px solid rgba(40,167,69,0.3);color:#75f5a0;}
        .alert-error-rev{background:rgba(220,53,69,0.1);border:1px solid rgba(220,53,69,0.3);color:#ff8fa3;}

        /* ── Empty state ── */
        .empty-state{text-align:center;padding:4rem 2rem;color:var(--text-muted);}
        .empty-state i{font-size:3.5rem;opacity:0.2;display:block;margin-bottom:1rem;}

        /* ── Footer ── */
        .rev-footer{background:var(--navy-mid);border-top:1px solid var(--border);padding:2rem 0;margin-top:4rem;text-align:center;color:var(--text-muted);font-size:0.85rem;}

        /* ── Responsive ── */
        @media(max-width:576px){
            .img-wrap{height:160px;}
            .img-placeholder{height:160px;}
            .p-name{font-size:0.82rem;}
            .btn-cart{font-size:0.75rem;padding:0.45rem 0.5rem;}
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="revshop-navbar navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/buyer/home}">Rev<span>Shop</span></a>
        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMenu">
            <i class="bi bi-list text-light fs-4"></i>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto align-items-center gap-1">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/buyer/wishlist}">
                        <i class="bi bi-heart me-1"></i>Wishlist
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/buyer/orders}">
                        <i class="bi bi-bag me-1"></i>Orders
                    </a>
                </li>
                <li class="nav-item position-relative">
                    <a class="nav-link" th:href="@{/buyer/notifications}">
                        <i class="bi bi-bell fs-5"></i>
                        <span class="nav-badge"
                              th:if="${unreadCount != null and unreadCount > 0}"
                              th:text="${unreadCount}"></span>
                    </a>
                </li>
                <li class="nav-item position-relative">
                    <a class="nav-link" th:href="@{/buyer/cart}">
                        <i class="bi bi-cart3 fs-5"></i>
                        <span class="nav-badge"
                              th:if="${cartCount != null and cartCount > 0}"
                              th:text="${cartCount}"></span>
                    </a>
                </li>

                <!-- ── Avatar dropdown ── -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2 p-0 ps-2"
                       href="#" id="profileDropdown" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <div style="
                            width:38px;height:38px;border-radius:50%;
                            background:linear-gradient(135deg,var(--orange),#e85d2b);
                            display:flex;align-items:center;justify-content:center;
                            font-weight:700;font-size:0.85rem;color:white;
                            border:2px solid rgba(255,107,53,0.4);
                            cursor:pointer;flex-shrink:0;">
                            <span th:text="${currentUser != null} ? ${currentUser.initials} : 'U'">U</span>
                        </div>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end mt-2"
                        style="background:var(--navy-mid);border:1px solid var(--border);border-radius:12px;min-width:210px;padding:0.5rem;box-shadow:0 12px 40px rgba(0,0,0,0.4);">
                        <!-- User info -->
                        <li style="padding:0.75rem 1rem;border-bottom:1px solid var(--border);">
                            <div style="font-weight:600;color:var(--text-light);font-size:0.9rem;"
                                 th:text="${currentUser != null} ? ${currentUser.firstName} + ' ' + ${currentUser.lastName} : ''"></div>
                            <div style="color:var(--text-muted);font-size:0.78rem;margin-top:2px;"
                                 th:text="${currentUser != null} ? ${currentUser.email} : ''"></div>
                        </li>
                        <li>
                            <a class="dropdown-item d-flex align-items-center gap-2 py-2 px-3 rounded-2"
                               th:href="@{/buyer/profile}">
                                <i class="bi bi-person-circle" style="color:var(--orange);"></i>
                                My Profile
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item d-flex align-items-center gap-2 py-2 px-3 rounded-2"
                               th:href="@{/buyer/orders}">
                                <i class="bi bi-bag-check" style="color:var(--orange);"></i>
                                My Orders
                            </a>
                        </li>
                        <li><hr style="border-color:var(--border);margin:0.4rem 0;"></li>
                        <li>
                            <a class="dropdown-item d-flex align-items-center gap-2 py-2 px-3 rounded-2"
                               th:href="@{/auth/logout}"
                               style="color:#ff8fa3!important;">
                                <i class="bi bi-box-arrow-right"></i>
                                Logout
                            </a>
                        </li>
                    </ul>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- Search Strip -->
<div class="search-strip">
    <div class="container">
        <form th:action="@{/buyer/home}" method="get">
            <div class="search-bar">
                <i class="bi bi-search ms-3" style="color:var(--text-muted);flex-shrink:0;"></i>
                <input type="text" name="keyword" th:value="${keyword}"
                       placeholder="Search products, categories, brands..."/>
                <button type="submit">
                    <i class="bi bi-search me-1"></i>Search
                </button>
            </div>
        </form>
    </div>
</div>

<div class="container py-4">

    <!-- Alerts -->
    <div th:if="${successMessage}" class="alert-rev alert-success-rev mb-3">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert-rev alert-error-rev mb-3">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Categories -->
    <div class="d-flex gap-2 flex-wrap mb-4">
        <a th:href="@{/buyer/home}"
           class="cat-chip"
           th:classappend="${keyword == null and selectedCategory == null} ? ' active' : ''">
            <i class="bi bi-grid-fill"></i> All
        </a>
        <a th:each="cat : ${categories}"
           th:href="@{/buyer/home(categoryId=${cat.id})}"
           class="cat-chip"
           th:classappend="${selectedCategory == cat.id} ? ' active' : ''"
           th:text="${cat.name}">Category</a>
    </div>

    <!-- Section Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 style="margin:0;font-size:1.3rem;"
                th:text="${keyword != null} ? 'Results for: &quot;' + ${keyword} + '&quot;' : 'All Products'">
                Products
            </h4>
            <small style="color:var(--text-muted);"
                   th:text="${products?.size() ?: 0} + ' products found'"></small>
        </div>
        <a th:if="${keyword != null}" th:href="@{/buyer/home}"
           style="color:var(--orange);font-size:0.85rem;text-decoration:none;display:flex;align-items:center;gap:4px;">
            <i class="bi bi-x-circle"></i>Clear
        </a>
    </div>

    <!-- Empty State -->
    <div th:if="${products == null or products.isEmpty()}" class="empty-state">
        <i class="bi bi-search"></i>
        <h5 style="color:var(--text-light);">No products found</h5>
        <p style="font-size:0.9rem;">Try a different search or browse all categories.</p>
        <a th:href="@{/buyer/home}"
           style="display:inline-block;margin-top:1rem;background:linear-gradient(135deg,var(--orange),#e85d2b);color:white;padding:0.6rem 1.5rem;border-radius:10px;text-decoration:none;font-weight:600;">
            Browse All
        </a>
    </div>

    <!-- Products Grid -->
    <div class="row g-3" th:if="${products != null and !products.isEmpty()}">
        <div class="col-6 col-md-4 col-lg-3"
             th:each="product : ${products}">
            <div class="product-card">
                <div class="img-wrap">
                    <img th:if="${product.imageUrl != null}"
                         th:src="${product.imageUrl}"
                         th:alt="${product.name}"
                         loading="lazy"/>
                    <div class="img-placeholder" th:unless="${product.imageUrl != null}">
                        <i class="bi bi-image"></i>
                    </div>
                    <span class="disc-badge"
                          th:if="${product.discountPercent != null and product.discountPercent > 0}"
                          th:text="${product.discountPercent} + '% OFF'"></span>
                    <form class="wish-form"
                          th:action="@{/buyer/wishlist/add/{id}(id=${product.id})}"
                          method="post">
                        <button type="submit" class="wish-btn" title="Add to Wishlist">
                            <i class="bi bi-heart" style="font-size:0.85rem;"></i>
                        </button>
                    </form>
                </div>

                <div class="card-body">
                    <div class="p-cat" th:text="${product.categoryName}"></div>
                    <div class="p-name" th:text="${product.name}">Name</div>

                    <!-- Rating -->
                    <div class="d-flex align-items-center gap-1 mb-2">
                        <span class="stars">
                            <i th:each="i : ${#numbers.sequence(1,5)}"
                               th:class="${i <= (product.averageRating ?: 0)} ? 'bi bi-star-fill' : 'bi bi-star'"></i>
                        </span>
                        <span style="color:var(--text-muted);font-size:0.7rem;"
                              th:text="'(' + (product.totalReviews ?: 0) + ')'"></span>
                    </div>

                    <!-- Price -->
                    <div class="d-flex align-items-baseline gap-2 mb-1">
                        <span class="p-price" th:text="'₹' + ${product.price}"></span>
                        <span class="p-mrp" th:if="${product.mrp != null}"
                              th:text="'₹' + ${product.mrp}"></span>
                    </div>

                    <!-- Actions -->
                    <div class="card-actions">
                        <form th:action="@{/buyer/cart/add}" method="post" style="flex:1;display:flex;">
                            <input type="hidden" name="productId" th:value="${product.id}"/>
                            <input type="hidden" name="quantity" value="1"/>
                            <button type="submit" class="btn-cart"
                                    th:disabled="${product.stockQuantity == 0}">
                                <i class="bi bi-cart-plus me-1"></i>
                                <span th:text="${product.stockQuantity == 0} ? 'Out of Stock' : 'Add to Cart'"></span>
                            </button>
                        </form>
                        <a th:href="@{/buyer/product/{id}(id=${product.id})}" class="btn-view" title="View Details">
                            <i class="bi bi-eye"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="rev-footer">
    <p style="font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--text-light);margin-bottom:0.3rem;">
        Rev<span style="color:var(--orange);">Shop</span>
    </p>
    <p>© 2026 RevShop. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
