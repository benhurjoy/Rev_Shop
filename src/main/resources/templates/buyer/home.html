<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Shop – RevShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root{--navy:#0A1628;--navy-mid:#112240;--navy-light:#1E3A5F;--orange:#FF6B35;--gold:#FFB347;--text-light:#E8EDF5;--text-muted:#8899AA;--card-bg:#112240;--border:rgba(255,107,53,0.2);}
        body{background:var(--navy);color:var(--text-light);font-family:'DM Sans',sans-serif;margin:0;}
        h1,h2,h3,h4{font-family:'Playfair Display',serif;}
        .revshop-navbar{background:linear-gradient(135deg,#0A1628,#1E3A5F);border-bottom:2px solid var(--orange);padding:0.75rem 0;position:sticky;top:0;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
        .navbar-brand{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:800;color:var(--text-light)!important;}
        .navbar-brand span{color:var(--orange);}
        .nav-link{color:var(--text-muted)!important;font-weight:500;padding:0.5rem 1rem!important;border-radius:8px;transition:all 0.3s;}
        .nav-link:hover{color:var(--text-light)!important;background:rgba(255,107,53,0.15);}
        /* Search strip */
        .search-strip{background:var(--navy-mid);border-bottom:1px solid var(--border);padding:1rem 0;}
        .search-bar{background:var(--card-bg);border:1.5px solid var(--border);border-radius:12px;display:flex;align-items:center;overflow:hidden;}
        .search-bar input{background:transparent;border:none;color:var(--text-light);padding:0.75rem 1rem;flex:1;font-family:'DM Sans',sans-serif;outline:none;}
        .search-bar input::placeholder{color:var(--text-muted);}
        .search-bar button{background:linear-gradient(135deg,var(--orange),#e85d2b);border:none;color:white;padding:0.75rem 1.2rem;cursor:pointer;font-weight:600;transition:all 0.3s;}
        /* Categories */
        .cat-chip{display:inline-flex;align-items:center;gap:5px;background:var(--card-bg);border:1.5px solid var(--border);border-radius:10px;padding:0.5rem 1rem;color:var(--text-muted);font-size:0.83rem;font-weight:500;cursor:pointer;transition:all 0.3s;text-decoration:none;white-space:nowrap;}
        .cat-chip:hover,.cat-chip.active{background:rgba(255,107,53,0.1);border-color:var(--orange);color:var(--orange);}
        /* Product Cards */
        .product-card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all 0.35s;height:100%;}
        .product-card:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(255,107,53,0.18);border-color:var(--orange);}
        .img-wrap{position:relative;height:200px;overflow:hidden;}
        .img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s;}
        .product-card:hover .img-wrap img{transform:scale(1.07);}
        .img-placeholder{width:100%;height:200px;background:linear-gradient(135deg,var(--navy-light),var(--card-bg));display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--text-muted);}
        .disc-badge{position:absolute;top:10px;left:10px;background:linear-gradient(135deg,var(--orange),#e85d2b);color:white;font-size:0.7rem;font-weight:700;padding:3px 8px;border-radius:6px;}
        .wish-btn{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(10,22,40,0.75);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;text-decoration:none;color:var(--text-muted);}
        .wish-btn:hover{background:rgba(255,107,53,0.2);border-color:var(--orange);color:var(--orange);}
        .card-body{padding:1.1rem;}
        .p-cat{font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--orange);font-weight:600;}
        .p-name{font-weight:600;font-size:0.92rem;color:var(--text-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0.3rem 0;}
        .stars{color:var(--gold);font-size:0.78rem;}
        .p-price{color:var(--orange);font-weight:700;font-size:1.05rem;}
        .p-mrp{color:var(--text-muted);font-size:0.78rem;text-decoration:line-through;}
        .btn-cart{background:linear-gradient(135deg,var(--orange),#e85d2b);color:white;border:none;border-radius:8px;padding:0.55rem 1rem;font-weight:600;font-size:0.83rem;width:100%;cursor:pointer;transition:all 0.3s;margin-top:0.7rem;}
        .btn-cart:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,107,53,0.4);color:white;}
        .nav-badge{background:var(--orange);color:white;border-radius:50%;font-size:0.62rem;padding:2px 5px;position:absolute;top:2px;right:2px;}
        .alert-success-rev{background:rgba(40,167,69,0.12);border:1px solid rgba(40,167,69,0.3);color:#75f5a0;border-radius:10px;padding:0.8rem 1rem;}
        .alert-error-rev{background:rgba(220,53,69,0.12);border:1px solid rgba(220,53,69,0.3);color:#ff8fa3;border-radius:10px;padding:0.8rem 1rem;}
        .rev-footer{background:var(--navy-mid);border-top:1px solid var(--border);padding:2rem 0;margin-top:4rem;text-align:center;color:var(--text-muted);font-size:0.85rem;}
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="revshop-navbar navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/buyer/home}">Rev<span>Shop</span></a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <i class="bi bi-list text-light fs-4"></i>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto align-items-center gap-1">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/buyer/wishlist}">
                        <i class="bi bi-heart me-1"></i>Wishlist
                    </a>
                </li>
                <li class="nav-item position-relative">
                    <a class="nav-link" th:href="@{/buyer/orders}">
                        <i class="bi bi-bag me-1"></i>Orders
                    </a>
                </li>
                <li class="nav-item position-relative">
                    <a class="nav-link" th:href="@{/buyer/notifications}">
                        <i class="bi bi-bell fs-5"></i>
                        <span class="nav-badge"
                              th:if="${unreadCount != null and unreadCount > 0}"
                              th:text="${unreadCount}"></span>
                    </a>
                </li>
                <li class="nav-item position-relative">
                    <a class="nav-link" th:href="@{/buyer/cart}">
                        <i class="bi bi-cart3 fs-5"></i>
                        <span class="nav-badge"
                              th:if="${cartCount != null and cartCount > 0}"
                              th:text="${cartCount}"></span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/auth/logout}">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Search Strip -->
<div class="search-strip">
    <div class="container">
        <form th:action="@{/buyer/home}" method="get">
            <div class="search-bar">
                <i class="bi bi-search ms-3 text-muted"></i>
                <input type="text" name="keyword" th:value="${keyword}"
                       placeholder="Search products, categories, brands..."/>
                <button type="submit"><i class="bi bi-search"></i></button>
            </div>
        </form>
    </div>
</div>

<div class="container py-4">

    <!-- Alerts -->
    <div th:if="${successMessage}" class="alert-success-rev mb-4">
        <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert-error-rev mb-4">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
    </div>

    <!-- Categories -->
    <div class="d-flex gap-2 flex-wrap mb-4">
        <a th:href="@{/buyer/home}"
           class="cat-chip"
           th:classappend="${keyword == null and selectedCategory == null} ? ' active' : ''">
            <i class="bi bi-grid-fill"></i> All
        </a>
        <a th:each="cat : ${categories}"
           th:href="@{/buyer/home(categoryId=${cat.id})}"
           class="cat-chip"
           th:classappend="${selectedCategory == cat.id} ? ' active' : ''"
           th:text="${cat.name}">Category</a>
    </div>

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 style="margin:0;" th:text="${keyword != null} ? 'Results for: ' + ${keyword} : 'All Products'">Products</h4>
            <small style="color:var(--text-muted);"
                   th:text="${products?.size() ?: 0} + ' products'"></small>
        </div>
        <a th:if="${keyword != null}" th:href="@{/buyer/home}"
           style="color:var(--orange);font-size:0.85rem;text-decoration:none;">
            <i class="bi bi-x me-1"></i>Clear search
        </a>
    </div>

    <!-- Products Grid -->
    <div th:if="${products == null or products.isEmpty()}"
         style="text-align:center;padding:4rem;color:var(--text-muted);">
        <i class="bi bi-search" style="font-size:3rem;opacity:0.2;display:block;margin-bottom:1rem;"></i>
        <p>No products found.</p>
    </div>

    <div class="row g-3" th:if="${products != null and !products.isEmpty()}">
        <div class="col-6 col-md-4 col-lg-3"
             th:each="product : ${products}">
            <div class="product-card">
                <div class="img-wrap">
                    <img th:if="${product.imageUrl != null}"
                         th:src="${product.imageUrl}"
                         th:alt="${product.name}"/>
                    <div class="img-placeholder" th:unless="${product.imageUrl != null}">
                        <i class="bi bi-image"></i>
                    </div>
                    <span class="disc-badge"
                          th:if="${product.discountPercent != null and product.discountPercent > 0}"
                          th:text="${product.discountPercent} + '%'"></span>
                    <form th:action="@{/buyer/wishlist/add/{id}(id=${product.id})}"
                          method="post" style="position:absolute;top:10px;right:10px;">
                        <button type="submit" class="wish-btn" title="Add to Wishlist">
                            <i class="bi bi-heart"></i>
                        </button>
                    </form>
                </div>
                <div class="card-body">
                    <div class="p-cat" th:text="${product.categoryName}"></div>
                    <div class="p-name" th:text="${product.name}">Name</div>
                    <div class="d-flex align-items-center gap-1 mb-1">
                        <span class="stars">
                            <i th:each="i : ${#numbers.sequence(1,5)}"
                               th:class="${i <= (product.averageRating ?: 0)} ? 'bi bi-star-fill' : 'bi bi-star'"></i>
                        </span>
                        <span style="color:var(--text-muted);font-size:0.72rem;"
                              th:text="'(' + (product.totalReviews ?: 0) + ')'"></span>
                    </div>
                    <div class="d-flex align-items-baseline gap-2 mb-1">
                        <span class="p-price" th:text="'₹' + ${product.price}"></span>
                        <span class="p-mrp" th:if="${product.mrp != null}"
                              th:text="'₹' + ${product.mrp}"></span>
                    </div>
                    <div style="display:flex;gap:0.5rem;">
                        <form th:action="@{/buyer/cart/add}" method="post" style="flex:1;">
                            <input type="hidden" name="productId" th:value="${product.id}"/>
                            <input type="hidden" name="quantity" value="1"/>
                            <button type="submit" class="btn-cart"
                                    th:disabled="${product.stockQuantity == 0}">
                                <i class="bi bi-cart-plus me-1"></i>
                                <span th:text="${product.stockQuantity == 0} ? 'Out of Stock' : 'Add to Cart'"></span>
                            </button>
                        </form>
                        <a th:href="@{/buyer/product/{id}(id=${product.id})}"
                           style="background:rgba(255,107,53,0.1);border:1px solid var(--border);border-radius:8px;padding:0.55rem 0.7rem;color:var(--text-muted);display:flex;align-items:center;text-decoration:none;transition:all 0.3s;"
                           onmouseover="this.style.borderColor='var(--orange)';this.style.color='var(--orange)'"
                           onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-muted)'">
                            <i class="bi bi-eye"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="rev-footer">
    <p style="font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--text-light);">
        Rev<span style="color:var(--orange);">Shop</span>
    </p>
    <p>© 2026 RevShop. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
