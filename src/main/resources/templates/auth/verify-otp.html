<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Verify OTP – RevShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root { --navy:#0A1628; --navy-mid:#112240; --orange:#FF6B35; --gold:#FFB347; --text-light:#E8EDF5; --text-muted:#8899AA; }
        body { background:var(--navy); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        body::before { content:''; position:fixed; top:-200px; right:-200px; width:600px; height:600px; background:radial-gradient(circle, rgba(255,107,53,0.1) 0%, transparent 70%); border-radius:50%; }
        .auth-card { background:var(--navy-mid); border:1px solid rgba(255,107,53,0.2); border-radius:24px; padding:2.5rem; max-width:420px; width:100%; box-shadow:0 30px 80px rgba(0,0,0,0.5); animation:fadeInUp 0.6s ease; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        .brand { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:800; color:var(--text-light); text-align:center; }
        .brand span { color:var(--orange); }
        .otp-icon { width:70px; height:70px; border-radius:50%; background:linear-gradient(135deg,rgba(255,107,53,0.2),rgba(255,179,71,0.1)); display:flex; align-items:center; justify-content:center; font-size:2rem; color:var(--orange); margin:1rem auto; border:1.5px solid rgba(255,107,53,0.3); }
        /* OTP Boxes */
        .otp-input-group { display:flex; gap:0.75rem; justify-content:center; margin:1.5rem 0; }
        .otp-box { width:52px; height:60px; text-align:center; font-size:1.4rem; font-weight:700; background:rgba(255,255,255,0.05); border:2px solid rgba(255,107,53,0.25); border-radius:12px; color:var(--text-light); caret-color:var(--orange); transition:all 0.3s ease; }
        .otp-box:focus { border-color:var(--orange); box-shadow:0 0 0 3px rgba(255,107,53,0.2); outline:none; background:rgba(255,255,255,0.08); }
        .btn-verify { background:linear-gradient(135deg,var(--orange),#e85d2b); color:white; border:none; border-radius:12px; padding:0.85rem; font-weight:700; width:100%; transition:all 0.3s ease; box-shadow:0 6px 20px rgba(255,107,53,0.35); }
        .btn-verify:hover { transform:translateY(-2px); box-shadow:0 12px 30px rgba(255,107,53,0.5); color:white; }
        .auth-link { color:var(--orange); text-decoration:none; font-weight:500; }
        .auth-link:hover { color:var(--gold); }
        .alert-success-rev { background:rgba(40,167,69,0.12); border:1px solid rgba(40,167,69,0.3); color:#75f5a0; border-radius:10px; padding:0.8rem 1rem; font-size:0.9rem; }
        .alert-error-rev { background:rgba(220,53,69,0.12); border:1px solid rgba(220,53,69,0.3); color:#ff8fa3; border-radius:10px; padding:0.8rem 1rem; font-size:0.9rem; }
        /* Timer */
        .timer { color:var(--text-muted); font-size:0.85rem; text-align:center; margin-top:0.5rem; }
        .timer span { color:var(--orange); font-weight:600; }
    </style>
</head>
<body>
<div class="px-3" style="width:100%;max-width:440px;position:relative;z-index:10;">
    <div class="auth-card">
        <div class="brand">Rev<span>Shop</span></div>

        <div class="otp-icon">
            <i class="bi bi-shield-lock"></i>
        </div>

        <h5 style="font-family:'Playfair Display',serif;text-align:center;color:var(--text-light);">
            Verify Your Email
        </h5>
        <p style="color:var(--text-muted);text-align:center;font-size:0.88rem;margin-bottom:0.5rem;">
            We sent a 6-digit OTP to
            <strong style="color:var(--text-light);" th:text="${email}">your email</strong>
        </p>

        <!-- Alerts -->
        <div th:if="${successMessage}" class="alert-success-rev mb-3">
            <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert-error-rev mb-3">
            <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/auth/verify-otp}" method="post" id="otpForm">
            <input type="hidden" name="email" th:value="${email}"/>
            <input type="hidden" name="otp" id="otpHidden"/>

            <!-- OTP Boxes -->
            <div class="otp-input-group">
                <input type="text" class="otp-box" maxlength="1" id="otp1" inputmode="numeric"/>
                <input type="text" class="otp-box" maxlength="1" id="otp2" inputmode="numeric"/>
                <input type="text" class="otp-box" maxlength="1" id="otp3" inputmode="numeric"/>
                <input type="text" class="otp-box" maxlength="1" id="otp4" inputmode="numeric"/>
                <input type="text" class="otp-box" maxlength="1" id="otp5" inputmode="numeric"/>
                <input type="text" class="otp-box" maxlength="1" id="otp6" inputmode="numeric"/>
            </div>

            <button type="submit" class="btn-verify" onclick="combineOtp()">
                <i class="bi bi-check-circle me-2"></i>Verify OTP
            </button>
        </form>

        <!-- Timer & Resend -->
        <div class="timer mt-3">
            OTP expires in <span id="countdown">10:00</span>
        </div>

        <form th:action="@{/auth/resend-otp}" method="post" class="text-center mt-3">
            <input type="hidden" name="email" th:value="${email}"/>
            <button type="submit"
                    style="background:none;border:none;color:var(--text-muted);font-size:0.85rem;cursor:pointer;">
                Didn't receive it?
                <span style="color:var(--orange);font-weight:600;">Resend OTP</span>
            </button>
        </form>

        <div class="text-center mt-3">
            <a th:href="@{/auth/login}" class="auth-link" style="font-size:0.85rem;">
                ← Back to Login
            </a>
        </div>
    </div>
</div>

<script>
    // Auto-advance OTP boxes
    const otpBoxes = [1,2,3,4,5,6].map(i => document.getElementById('otp'+i));
    otpBoxes.forEach((box, idx) => {
        box.addEventListener('input', () => {
            box.value = box.value.replace(/[^0-9]/g,'');
            if (box.value && idx < 5) otpBoxes[idx+1].focus();
        });
        box.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !box.value && idx > 0) {
                otpBoxes[idx-1].focus();
            }
        });
        box.addEventListener('paste', (e) => {
            const paste = e.clipboardData.getData('text').replace(/\D/g,'');
            paste.split('').slice(0,6).forEach((ch, i) => {
                if (otpBoxes[i]) otpBoxes[i].value = ch;
            });
            e.preventDefault();
        });
    });

    function combineOtp() {
        document.getElementById('otpHidden').value =
            otpBoxes.map(b => b.value).join('');
    }

    // Countdown timer
    let seconds = 600;
    const countdown = document.getElementById('countdown');
    const timer = setInterval(() => {
        seconds--;
        if (seconds <= 0) { clearInterval(timer); countdown.textContent = 'Expired'; return; }
        const m = Math.floor(seconds/60).toString().padStart(2,'0');
        const s = (seconds%60).toString().padStart(2,'0');
        countdown.textContent = m+':'+s;
    }, 1000);
</script>
</body>
</html>
