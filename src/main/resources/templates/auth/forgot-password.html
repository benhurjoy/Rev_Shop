<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Forgot Password – RevShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root { --navy:#0A1628; --navy-mid:#112240; --orange:#FF6B35; --gold:#FFB347; --text-light:#E8EDF5; --text-muted:#8899AA; }
        body { background:var(--navy); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        body::before { content:''; position:fixed; top:-200px; right:-200px; width:600px; height:600px; background:radial-gradient(circle, rgba(255,107,53,0.1) 0%, transparent 70%); border-radius:50%; }
        .auth-card { background:var(--navy-mid); border:1px solid rgba(255,107,53,0.2); border-radius:24px; padding:2.5rem; max-width:420px; width:100%; box-shadow:0 30px 80px rgba(0,0,0,0.5); animation:fadeInUp 0.6s ease; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        .brand { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:800; color:var(--text-light); text-align:center; }
        .brand span { color:var(--orange); }
        .icon-circle { width:70px; height:70px; border-radius:50%; background:rgba(255,107,53,0.1); display:flex; align-items:center; justify-content:center; font-size:2rem; color:var(--orange); margin:1rem auto; border:1.5px solid rgba(255,107,53,0.3); }
        .form-control { background:rgba(255,255,255,0.05)!important; border:1.5px solid rgba(255,107,53,0.2)!important; border-radius:12px!important; color:var(--text-light)!important; padding:0.8rem 1rem!important; }
        .form-control:focus { border-color:var(--orange)!important; box-shadow:0 0 0 3px rgba(255,107,53,0.15)!important; background:rgba(255,255,255,0.08)!important; }
        .form-control::placeholder { color:var(--text-muted)!important; }
        .form-label { color:var(--text-muted); font-size:0.83rem; font-weight:500; }
        .btn-main { background:linear-gradient(135deg,var(--orange),#e85d2b); color:white; border:none; border-radius:12px; padding:0.85rem; font-weight:700; width:100%; transition:all 0.3s ease; box-shadow:0 6px 20px rgba(255,107,53,0.35); }
        .btn-main:hover { transform:translateY(-2px); box-shadow:0 12px 30px rgba(255,107,53,0.5); color:white; }
        .auth-link { color:var(--orange); text-decoration:none; font-weight:500; }
        .alert-success-rev { background:rgba(40,167,69,0.12); border:1px solid rgba(40,167,69,0.3); color:#75f5a0; border-radius:10px; padding:0.8rem 1rem; font-size:0.9rem; }
        .alert-error-rev { background:rgba(220,53,69,0.12); border:1px solid rgba(220,53,69,0.3); color:#ff8fa3; border-radius:10px; padding:0.8rem 1rem; font-size:0.9rem; }
    </style>
</head>
<body>
<div style="width:100%;max-width:440px;padding:1rem;position:relative;z-index:10;">
    <div class="auth-card">
        <div class="brand">Rev<span>Shop</span></div>
        <div class="icon-circle"><i class="bi bi-key"></i></div>
        <h5 style="font-family:'Playfair Display',serif;text-align:center;color:var(--text-light);">Forgot Password?</h5>
        <p style="color:var(--text-muted);text-align:center;font-size:0.88rem;">Enter your email and we'll send you an OTP to reset your password.</p>

        <div th:if="${successMessage}" class="alert-success-rev mb-3">
            <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert-error-rev mb-3">
            <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/auth/forgot-password}" method="post">
            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" name="email"
                       placeholder="your@email.com" required/>
            </div>
            <button type="submit" class="btn-main">
                <i class="bi bi-send me-2"></i>Send OTP
            </button>
        </form>

        <div class="text-center mt-3">
            <a th:href="@{/auth/login}" class="auth-link" style="font-size:0.85rem;">
                ← Back to Login
            </a>
        </div>
    </div>
</div>
</body>
</html>
