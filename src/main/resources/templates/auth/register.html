<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register – RevShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root {
            --navy:#0A1628; --navy-mid:#112240; --navy-light:#1E3A5F;
            --orange:#FF6B35; --gold:#FFB347;
            --text-light:#E8EDF5; --text-muted:#8899AA;
        }

        /* ── scrollable body ── */
        body {
            background: var(--navy);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;          /* allow natural top-alignment */
            justify-content: center;
            position: relative;
            overflow-y: auto;                 /* enable vertical scroll */
            overflow-x: hidden;
            padding: 2.5rem 1rem;
        }

        body::before {
            content: '';
            position: fixed;
            top: -150px; right: -150px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(255,107,53,0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -150px; left: -150px;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(30,58,95,0.5) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .auth-container {
            width: 100%; max-width: 520px;
            position: relative; z-index: 10;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity:0; transform:translateY(30px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .auth-card {
            background: var(--navy-mid);
            border: 1px solid rgba(255,107,53,0.2);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 2rem; font-weight: 800;
            color: var(--text-light);
            text-align: center; margin-bottom: 0.2rem;
        }
        .brand span { color: var(--orange); }

        .auth-subtitle {
            text-align: center; color: var(--text-muted);
            font-size: 0.9rem; margin-bottom: 2rem;
        }

        .form-label {
            color: var(--text-muted);
            font-size: 0.83rem; font-weight: 500;
            margin-bottom: 0.4rem;
        }

        /* ── inputs ── */
        .form-control, .form-select {
            background: rgba(255,255,255,0.05) !important;
            border: 1.5px solid rgba(255,107,53,0.2) !important;
            border-radius: 12px !important;
            color: var(--text-light) !important;
            padding: 0.75rem 1rem !important;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--orange) !important;
            box-shadow: 0 0 0 3px rgba(255,107,53,0.15) !important;
            background: rgba(255,255,255,0.08) !important;
        }
        .form-control::placeholder { color: var(--text-muted) !important; }
        .form-select option { background: var(--navy-mid); }

        /* ── password wrapper ── */
        .password-wrapper {
            position: relative;
        }
        .password-wrapper .form-control {
            padding-right: 3rem !important;
        }
        .toggle-pw {
            position: absolute;
            right: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1;
            transition: color 0.2s ease;
            z-index: 5;
        }
        .toggle-pw:hover { color: var(--orange); }

        /* ── password strength bar ── */
        .strength-bar-wrap {
            display: flex; gap: 4px; margin-top: 6px;
        }
        .strength-segment {
            flex: 1; height: 3px; border-radius: 4px;
            background: rgba(255,255,255,0.1);
            transition: background 0.3s ease;
        }
        .strength-segment.weak   { background: #e74c3c; }
        .strength-segment.fair   { background: var(--gold); }
        .strength-segment.strong { background: #2ecc71; }

        .strength-label {
            font-size: 0.75rem;
            margin-top: 4px;
            color: var(--text-muted);
            min-height: 1em;
        }

        /* ── match indicator ── */
        .match-indicator {
            font-size: 0.78rem;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
            min-height: 1.2em;
        }
        .match-indicator.match   { color: #2ecc71; }
        .match-indicator.no-match { color: #e74c3c; }

        /* ── register button ── */
        .btn-register {
            background: linear-gradient(135deg, var(--orange), #e85d2b);
            color: white; border: none; border-radius: 12px;
            padding: 0.85rem; font-weight: 700; font-size: 1rem;
            width: 100%; transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255,107,53,0.35);
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255,107,53,0.5);
            color: white;
        }
        .btn-register:disabled {
            opacity: 0.55;
            transform: none;
            cursor: not-allowed;
            box-shadow: none;
        }

        .auth-link { color: var(--orange); text-decoration: none; font-weight: 500; }
        .auth-link:hover { color: var(--gold); }

        .alert-error-rev {
            background: rgba(220,53,69,0.12);
            border: 1px solid rgba(220,53,69,0.3);
            color: #ff8fa3; border-radius: 10px;
            padding: 0.8rem 1rem; font-size: 0.9rem;
        }
        .text-danger { color: #ff8fa3 !important; font-size: 0.8rem; }

        /* ── role selector ── */
        .role-selector {
            display: flex; gap: 1rem; margin-bottom: 1rem;
        }
        .role-option {
            flex: 1; text-align: center;
            padding: 1rem 0.5rem;
            border: 1.5px solid rgba(255,107,53,0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-muted);
        }
        .role-option:hover {
            border-color: var(--orange);
            background: rgba(255,107,53,0.05);
        }
        .role-option i { display: block; font-size: 1.5rem; margin-bottom: 0.4rem; }
        .role-option span { font-size: 0.85rem; font-weight: 500; }
        .role-option.selected {
            border-color: var(--orange);
            background: rgba(255,107,53,0.12);
            color: var(--orange);
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-card">

        <div class="brand">Rev<span>Shop</span></div>
        <p class="auth-subtitle">Create your account and start shopping</p>

        <!-- Error Alert -->
        <div th:if="${errorMessage}" class="alert-error-rev mb-3">
            <i class="bi bi-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/auth/register}" th:object="${registerDTO}" method="post" id="registerForm">

            <!-- Name row -->
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control"
                           th:field="*{firstName}" placeholder="John"/>
                    <div class="text-danger" th:if="${#fields.hasErrors('firstName')}"
                         th:errors="*{firstName}"></div>
                </div>
                <div class="col-6">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control"
                           th:field="*{lastName}" placeholder="Doe"/>
                    <div class="text-danger" th:if="${#fields.hasErrors('lastName')}"
                         th:errors="*{lastName}"></div>
                </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control"
                       th:field="*{email}" placeholder="your@email.com"/>
                <div class="text-danger" th:if="${#fields.hasErrors('email')}"
                     th:errors="*{email}"></div>
            </div>

            <!-- Phone -->
            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-control"
                       th:field="*{phone}" placeholder="10-digit mobile number"/>
                <div class="text-danger" th:if="${#fields.hasErrors('phone')}"
                     th:errors="*{phone}"></div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="password-wrapper">
                    <input type="password" class="form-control" id="passwordField"
                           th:field="*{password}" placeholder="Min 6 characters"
                           oninput="checkStrength(this.value); checkMatch()"/>
                    <button type="button" class="toggle-pw" onclick="toggleVisibility('passwordField', 'toggleIcon1')"
                            tabindex="-1" aria-label="Toggle password visibility">
                        <i class="bi bi-eye" id="toggleIcon1"></i>
                    </button>
                </div>
                <!-- Strength bar -->
                <div class="strength-bar-wrap" id="strengthBar">
                    <div class="strength-segment" id="seg1"></div>
                    <div class="strength-segment" id="seg2"></div>
                    <div class="strength-segment" id="seg3"></div>
                    <div class="strength-segment" id="seg4"></div>
                </div>
                <div class="strength-label" id="strengthLabel"></div>
                <div class="text-danger" th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}"></div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-4">
                <label class="form-label">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" class="form-control" id="confirmPasswordField"
                           name="confirmPassword" placeholder="Re-enter your password"
                           oninput="checkMatch()"/>
                    <button type="button" class="toggle-pw" onclick="toggleVisibility('confirmPasswordField', 'toggleIcon2')"
                            tabindex="-1" aria-label="Toggle confirm password visibility">
                        <i class="bi bi-eye" id="toggleIcon2"></i>
                    </button>
                </div>
                <div class="match-indicator" id="matchIndicator"></div>
            </div>

            <!-- Role -->
            <div class="mb-4">
                <label class="form-label">Register As</label>
                <div class="role-selector">
                    <div class="role-option" id="role-buyer"
                         onclick="selectRole('BUYER')">
                        <i class="bi bi-person-circle"></i>
                        <span>Buyer</span>
                    </div>
                    <div class="role-option" id="role-seller"
                         onclick="selectRole('SELLER')">
                        <i class="bi bi-shop"></i>
                        <span>Seller</span>
                    </div>
                </div>
                <input type="hidden" th:field="*{role}" id="roleInput"/>
                <div class="text-danger" th:if="${#fields.hasErrors('role')}"
                     th:errors="*{role}"></div>
            </div>

            <button type="submit" class="btn-register" id="submitBtn">
                <i class="bi bi-person-plus me-2"></i>Create Account
            </button>

            <div class="text-center mt-3" style="color:var(--text-muted);font-size:0.9rem;">
                Already have an account?
                <a th:href="@{/auth/login}" class="auth-link ms-1">Sign in →</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    /* ── Role selector ── */
    function selectRole(role) {
        document.querySelectorAll('.role-option').forEach(el => el.classList.remove('selected'));
        document.getElementById('role-' + role.toLowerCase()).classList.add('selected');
        document.getElementById('roleInput').value = role;
    }
    const existingRole = document.getElementById('roleInput').value;
    if (existingRole) selectRole(existingRole);

    /* ── Toggle password visibility ── */
    function toggleVisibility(fieldId, iconId) {
        const field = document.getElementById(fieldId);
        const icon  = document.getElementById(iconId);
        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            field.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }

    /* ── Password strength ── */
    function checkStrength(value) {
        const segs   = [document.getElementById('seg1'), document.getElementById('seg2'),
                        document.getElementById('seg3'), document.getElementById('seg4')];
        const label  = document.getElementById('strengthLabel');
        const levels = ['weak','fair','fair','strong'];
        const labels = ['', 'Weak', 'Fair', 'Strong', 'Very Strong'];

        let score = 0;
        if (value.length >= 6)                         score++;
        if (value.length >= 10)                        score++;
        if (/[A-Z]/.test(value) && /[0-9]/.test(value)) score++;
        if (/[^A-Za-z0-9]/.test(value))               score++;

        segs.forEach((s, i) => {
            s.className = 'strength-segment';
            if (i < score) s.classList.add(levels[score - 1] || 'strong');
        });

        const colorMap = { 1: '#e74c3c', 2: 'var(--gold)', 3: 'var(--gold)', 4: '#2ecc71' };
        label.textContent = value.length ? labels[score] : '';
        label.style.color = value.length ? (colorMap[score] || 'var(--text-muted)') : 'var(--text-muted)';
    }

    /* ── Confirm password match ── */
    function checkMatch() {
        const pw      = document.getElementById('passwordField').value;
        const confirm = document.getElementById('confirmPasswordField').value;
        const indicator = document.getElementById('matchIndicator');
        const submitBtn = document.getElementById('submitBtn');

        if (!confirm) {
            indicator.textContent = '';
            indicator.className = 'match-indicator';
            submitBtn.disabled = false;
            return;
        }

        if (pw === confirm) {
            indicator.innerHTML = '<i class="bi bi-check-circle-fill"></i> Passwords match';
            indicator.className = 'match-indicator match';
            submitBtn.disabled = false;
        } else {
            indicator.innerHTML = '<i class="bi bi-x-circle-fill"></i> Passwords do not match';
            indicator.className = 'match-indicator no-match';
            submitBtn.disabled = true;
        }
    }

    /* ── Block submit if passwords don't match ── */
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const pw      = document.getElementById('passwordField').value;
        const confirm = document.getElementById('confirmPasswordField').value;
        if (pw !== confirm) {
            e.preventDefault();
            checkMatch();
        }
    });
</script>
</body>
</html>
