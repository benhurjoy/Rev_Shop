<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login – RevShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root {
            --navy:#0A1628; --navy-mid:#112240; --navy-light:#1E3A5F;
            --orange:#FF6B35; --gold:#FFB347;
            --text-light:#E8EDF5; --text-muted:#8899AA;
        }
        body {
            background: var(--navy);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;       /* changed from center so page can scroll */
            justify-content: center;
            position: relative;
            overflow-y: auto;              /* scrollable */
            overflow-x: hidden;
            padding: 2rem 1rem;            /* breathing room top/bottom */
        }
        body::before {
            content: '';
            position: fixed;
            top: -200px; right: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,107,53,0.12) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 6s ease-in-out infinite;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -200px; left: -200px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(30,58,95,0.6) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 8s ease-in-out infinite reverse;
            pointer-events: none;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .auth-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.6s ease;
            /* vertically center when content is shorter than viewport */
            margin: auto;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .auth-card {
            background: var(--navy-mid);
            border: 1px solid rgba(255,107,53,0.2);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }
        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-light);
            text-align: center;
            margin-bottom: 0.2rem;
        }
        .brand span { color: var(--orange); }
        .auth-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .form-label {
            color: var(--text-muted);
            font-size: 0.83rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
        }
        .form-control {
            background: rgba(255,255,255,0.05) !important;
            border: 1.5px solid rgba(255,107,53,0.2) !important;
            border-radius: 12px !important;
            color: var(--text-light) !important;
            padding: 0.8rem 1rem !important;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: var(--orange) !important;
            box-shadow: 0 0 0 3px rgba(255,107,53,0.15) !important;
            background: rgba(255,255,255,0.08) !important;
        }
        .form-control::placeholder { color: var(--text-muted) !important; }

        /* Input group – icon prefix */
        .input-group-text {
            background: rgba(255,107,53,0.1) !important;
            border: 1.5px solid rgba(255,107,53,0.2) !important;
            border-right: none !important;
            border-radius: 12px 0 0 12px !important;
            color: var(--orange) !important;
        }
        .input-group .form-control {
            border-left: none !important;
            border-radius: 0 !important;         /* middle segment */
        }

        /* Show-password toggle button (right side of input group) */
        .btn-eye {
            background: rgba(255,107,53,0.1) !important;
            border: 1.5px solid rgba(255,107,53,0.2) !important;
            border-left: none !important;
            border-radius: 0 12px 12px 0 !important;
            color: var(--text-muted) !important;
            padding: 0 0.85rem;
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }
        .btn-eye:hover { color: var(--orange) !important; }
        .btn-eye:focus { outline: none; box-shadow: none !important; }

        .btn-login {
            background: linear-gradient(135deg, var(--orange), #e85d2b);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.85rem;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255,107,53,0.35);
            letter-spacing: 0.3px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255,107,53,0.5);
            color: white;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,107,53,0.15);
        }
        .divider span { color: var(--text-muted); font-size: 0.8rem; }
        .auth-link {
            color: var(--orange);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .auth-link:hover { color: var(--gold); }

        /* Alerts */
        .alert-success-rev {
            background: rgba(40,167,69,0.12);
            border: 1px solid rgba(40,167,69,0.3);
            color: #75f5a0;
            border-radius: 10px;
            padding: 0.8rem 1rem;
            font-size: 0.9rem;
        }
        .alert-error-rev {
            background: rgba(220,53,69,0.12);
            border: 1px solid rgba(220,53,69,0.3);
            color: #ff8fa3;
            border-radius: 10px;
            padding: 0.8rem 1rem;
            font-size: 0.9rem;
        }

        /* Remember me – fully visible */
        .form-check-input {
            background-color: rgba(255,255,255,0.08) !important;
            border: 1.5px solid rgba(255,107,53,0.4) !important;
            border-radius: 4px !important;
            width: 1.1em;
            height: 1.1em;
            cursor: pointer;
        }
        .form-check-input:checked {
            background-color: var(--orange) !important;
            border-color: var(--orange) !important;
        }
        .form-check-input:focus {
            box-shadow: 0 0 0 3px rgba(255,107,53,0.2) !important;
        }
        .form-check-label {
            color: var(--text-light) !important;   /* bright so it's visible */
            font-size: 0.88rem;
            cursor: pointer;
            user-select: none;
        }

        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,107,53,0.1);
            border: 1px solid rgba(255,107,53,0.25);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.8rem;
            color: var(--orange);
            margin: 0.5rem;
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-card">

        <!-- Brand -->
        <div class="brand">Rev<span>Shop</span></div>
        <p class="auth-subtitle">Welcome back! Sign in to continue</p>

        <!-- Alerts -->
        <div th:if="${successMessage}" class="alert-success-rev mb-3">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert-error-rev mb-3">
            <i class="bi bi-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- Login Form -->
        <form th:action="@{/auth/login}" th:object="${loginDTO}" method="post">

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control"
                           th:field="*{email}"
                           placeholder="your@email.com"/>
                </div>
                <div class="text-danger small mt-1"
                     th:if="${#fields.hasErrors('email')}"
                     th:errors="*{email}"></div>
            </div>

            <!-- Password with show/hide toggle -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control"
                           th:field="*{password}"
                           placeholder="••••••••" id="passwordField"/>
                    <button type="button" class="btn-eye" id="togglePassword"
                            onclick="togglePasswordVisibility('passwordField','togglePasswordIcon')"
                            aria-label="Show / hide password">
                        <i class="bi bi-eye" id="togglePasswordIcon"></i>
                    </button>
                </div>
                <div class="text-danger small mt-1"
                     th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}"></div>
            </div>

            <!-- Remember me + Forgot password -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check d-flex align-items-center gap-2 m-0">
                    <input class="form-check-input mt-0" type="checkbox" id="remember" name="remember"/>
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>
                <a th:href="@{/auth/forgot-password}" class="auth-link" style="font-size:0.85rem;">
                    Forgot password?
                </a>
            </div>

            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <div class="divider"><span>Don't have an account?</span></div>

        <div class="text-center">
            <a th:href="@{/auth/register}" class="auth-link">
                Create your RevShop account →
            </a>
        </div>

        <!-- Demo roles hint -->
        <div class="text-center mt-3">
            <small style="color:var(--text-muted);font-size:0.78rem;">Login as:</small><br/>
            <span class="role-badge"><i class="bi bi-shield-check"></i>Admin</span>
            <span class="role-badge"><i class="bi bi-shop"></i>Seller</span>
            <span class="role-badge"><i class="bi bi-person"></i>Buyer</span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePasswordVisibility(fieldId, iconId) {
        const field = document.getElementById(fieldId);
        const icon  = document.getElementById(iconId);
        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            field.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
</body>
</html>
